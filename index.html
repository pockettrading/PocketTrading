<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0E17 0%, #06090F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-container {
            text-align: center;
        }

        .logo {
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .logo svg {
            width: 80px;
            height: 80px;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-top: 1rem;
        }

        .logo-text span {
            color: #F7931A;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(247, 147, 26, 0.3);
            border-radius: 50%;
            border-top-color: #F7931A;
            animation: spin 1s ease-in-out infinite;
            margin: 2rem auto;
        }

        .loading-text {
            color: #A0AAB5;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">
            <svg width="80" height="80" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="#F7931A"/>
                <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
            </svg>
            <div class="logo-text">Pocket<span>Trading</span></div>
        </div>
        <div class="loader"></div>
        <div class="loading-text">Loading secure platform...</div>
    </div>

    <script>
        // Redirect to home page after a short delay
        setTimeout(function() {
            window.location.href = 'home.html';
        }, 1500);
    </script>
</body>
</html>
