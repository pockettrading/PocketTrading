<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login & Register - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0F1A 0%, #0F1420 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon { font-size: 48px; margin-bottom: 8px; }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 60px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 60px;
            color: #8B93A5;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
        }

        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #D1D5DB;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 18px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00D897;
            background: rgba(0, 216, 151, 0.05);
        }
        .form-group input.error {
            border-color: #FF4757;
        }
        .form-group input.valid {
            border-color: #00D897;
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: #8B93A5;
            cursor: pointer;
            font-size: 18px;
        }

        .error-message {
            color: #FF4757;
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #D1D5DB;
        }
        .forgot-link {
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 216, 151, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .terms-text {
            text-align: center;
            font-size: 12px;
            color: #6B7280;
            margin-top: 24px;
        }
        .terms-text a {
            color: #00D897;
            text-decoration: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 10000;
            animation: slideDown 0.3s ease-out;
            max-width: 90%;
            text-align: center;
        }
        .notification-success { background: rgba(0, 216, 151, 0.95); color: white; }
        .notification-error { background: rgba(255, 71, 87, 0.95); color: white; }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; }
            .logo-text { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">📈</div>
                <div class="logo-text">PocketTrading</div>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" action="javascript:void(0)">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">👁️</button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                </div>
                
                <button type="button" class="submit-btn" id="loginBtn">Login →</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" action="javascript:void(0)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="regFullName" placeholder="First and last name">
                    </div>
                    <div class="error-message" id="nameError">Please enter first and last name</div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="regEmail" placeholder="Enter your email">
                    </div>
                    <div class="error-message" id="emailError">Please enter a valid email address</div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPassword" placeholder="Create a password (min 8 characters)">
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword')">👁️</button>
                    </div>
                    <div class="error-message" id="passwordError">Password must be at least 8 characters</div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                        <button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword')">👁️</button>
                    </div>
                    <div class="error-message" id="confirmError">Passwords do not match</div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsAgree"> I agree to the <a href="#">Terms of Service</a>
                    </label>
                </div>
                
                <button type="button" class="submit-btn" id="registerBtn">Create Account →</button>
            </form>

            <div class="terms-text">
                By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (tab === 'login') {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                } else {
                    loginForm.classList.remove('active');
                    registerForm.classList.add('active');
                }
            });
        });
        
        // Toggle password visibility
        window.togglePassword = function(fieldId) {
            const field = document.getElementById(fieldId);
            if (field) {
                field.type = field.type === 'password' ? 'text' : 'password';
            }
        };
        
        // Real-time validation for register form
        const regFullName = document.getElementById('regFullName');
        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const regConfirmPassword = document.getElementById('regConfirmPassword');
        
        regFullName.addEventListener('input', () => {
            const nameParts = regFullName.value.trim().split(/\s+/);
            const nameError = document.getElementById('nameError');
            if (nameParts.length < 2 || nameParts[0].length === 0 || nameParts[1].length === 0) {
                regFullName.classList.add('error');
                regFullName.classList.remove('valid');
                nameError.style.display = 'block';
            } else {
                regFullName.classList.remove('error');
                regFullName.classList.add('valid');
                nameError.style.display = 'none';
            }
        });
        
        regEmail.addEventListener('input', () => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const emailError = document.getElementById('emailError');
            if (!emailRegex.test(regEmail.value)) {
                regEmail.classList.add('error');
                regEmail.classList.remove('valid');
                emailError.style.display = 'block';
            } else {
                regEmail.classList.remove('error');
                regEmail.classList.add('valid');
                emailError.style.display = 'none';
            }
        });
        
        regPassword.addEventListener('input', () => {
            const passwordError = document.getElementById('passwordError');
            if (regPassword.value.length < 8 && regPassword.value.length > 0) {
                regPassword.classList.add('error');
                regPassword.classList.remove('valid');
                passwordError.style.display = 'block';
            } else if (regPassword.value.length >= 8) {
                regPassword.classList.remove('error');
                regPassword.classList.add('valid');
                passwordError.style.display = 'none';
            }
            // Also check confirm password match
            if (regConfirmPassword.value.length > 0) {
                if (regPassword.value !== regConfirmPassword.value) {
                    regConfirmPassword.classList.add('error');
                    document.getElementById('confirmError').style.display = 'block';
                } else {
                    regConfirmPassword.classList.remove('error');
                    regConfirmPassword.classList.add('valid');
                    document.getElementById('confirmError').style.display = 'none';
                }
            }
        });
        
        regConfirmPassword.addEventListener('input', () => {
            const confirmError = document.getElementById('confirmError');
            if (regPassword.value !== regConfirmPassword.value) {
                regConfirmPassword.classList.add('error');
                regConfirmPassword.classList.remove('valid');
                confirmError.style.display = 'block';
            } else {
                regConfirmPassword.classList.remove('error');
                regConfirmPassword.classList.add('valid');
                confirmError.style.display = 'none';
            }
        });
        
        // Login function - redirect to index.html (home page)
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                showNotification('Please enter email and password', 'error');
                return;
            }
            
            if (typeof auth === 'undefined') {
                showNotification('System loading. Please wait and try again.', 'error');
                return;
            }
            
            const success = await auth.login(email, password, rememberMe);
            if (success) {
                showNotification('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        });
        
        // Register function - redirect to index.html (home page)
        document.getElementById('registerBtn').addEventListener('click', async () => {
            // Validate all fields before submission
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const termsAgree = document.getElementById('termsAgree').checked;
            
            // Validate full name
            const nameParts = fullName.split(/\s+/);
            if (nameParts.length < 2) {
                showNotification('Please enter your full name (first and last name)', 'error');
                document.getElementById('regFullName').focus();
                return;
            }
            
            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showNotification('Please enter a valid email address', 'error');
                document.getElementById('regEmail').focus();
                return;
            }
            
            // Validate password length
            if (password.length < 8) {
                showNotification('Password must be at least 8 characters', 'error');
                document.getElementById('regPassword').focus();
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                showNotification('Passwords do not match', 'error');
                document.getElementById('regConfirmPassword').focus();
                return;
            }
            
            // Validate terms
            if (!termsAgree) {
                showNotification('Please agree to the Terms of Service', 'error');
                return;
            }
            
            if (typeof auth === 'undefined') {
                showNotification('System loading. Please wait and try again.', 'error');
                return;
            }
            
            const success = await auth.register(fullName, email, password);
            if (success) {
                showNotification('Registration successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }
        });
        
        // Forgot password
        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            showNotification('Password reset link would be sent to your email (Demo feature)', 'info');
        });
        
        // Notification function
        function showNotification(message, type) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Check if already logged in
        setTimeout(() => {
            if (typeof auth !== 'undefined' && auth.isLoggedIn()) {
                window.location.href = 'index.html';
            }
        }, 500);
    </script>
</body>
</html>
