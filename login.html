<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login & Register - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0F1A 0%, #0F1420 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* Animated Background */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: float 10s ease-in-out infinite;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: #00D897;
            top: -150px;
            right: -150px;
        }
        .shape-2 {
            width: 300px;
            height: 300px;
            background: #FF4757;
            bottom: -100px;
            left: -100px;
            animation-delay: 2s;
        }
        .shape-3 {
            width: 250px;
            height: 250px;
            background: #FFA502;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }
        @keyframes float {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(20px,-20px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon { font-size: 48px; margin-bottom: 8px; }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 60px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 60px;
            color: #8B93A5;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 216, 151, 0.3);
        }

        /* Forms */
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #D1D5DB;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 18px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00D897;
            background: rgba(0, 216, 151, 0.05);
        }
        .form-group input.error {
            border-color: #FF4757;
        }
        .form-group input.valid {
            border-color: #00D897;
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: #8B93A5;
            cursor: pointer;
            font-size: 18px;
        }

        .error-message {
            color: #FF4757;
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #D1D5DB;
        }
        .forgot-link {
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 216, 151, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .terms-text {
            text-align: center;
            font-size: 12px;
            color: #6B7280;
            margin-top: 24px;
        }
        .terms-text a {
            color: #00D897;
            text-decoration: none;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 10000;
            animation: slideDown 0.3s ease-out;
            max-width: 90%;
            text-align: center;
        }
        .notification-success { background: rgba(0, 216, 151, 0.95); color: white; }
        .notification-error { background: rgba(255, 71, 87, 0.95); color: white; }
        .notification-info { background: rgba(255, 165, 2, 0.95); color: white; }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; }
            .logo-text { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">📈</div>
                <div class="logo-text">PocketTrading</div>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" action="javascript:void(0)">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">👁️</button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                </div>
                
                <button type="button" class="submit-btn" id="loginBtn">Login →</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" action="javascript:void(0)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="regFullName" placeholder="First and last name" autocomplete="name">
                    </div>
                    <div class="error-message" id="nameError">Please enter first and last name</div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="regEmail" placeholder="Enter your email" autocomplete="email">
                    </div>
                    <div class="error-message" id="emailError">Please enter a valid email address</div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPassword" placeholder="Create a password (min 8 characters)">
                        <button type="button" class="password-toggle" onclick="togglePassword('regPassword')">👁️</button>
                    </div>
                    <div class="error-message" id="passwordError">Password must be at least 8 characters</div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                        <button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword')">👁️</button>
                    </div>
                    <div class="error-message" id="confirmError">Passwords do not match</div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsAgree"> I agree to the <a href="#">Terms of Service</a>
                    </label>
                </div>
                
                <button type="button" class="submit-btn" id="registerBtn">Create Account →</button>
            </form>

            <div class="terms-text">
                By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; align-items: center; justify-content: center;">
        <div style="background: #1E2A3A; border-radius: 24px; padding: 32px; max-width: 400px; width: 90%;">
            <h3 style="margin-bottom: 16px;">Reset Password</h3>
            <p style="color: #8B93A5; margin-bottom: 20px;">Enter your email to receive reset instructions.</p>
            <input type="email" id="resetEmail" placeholder="Your email" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 20px;">
            <div style="display: flex; gap: 12px;">
                <button onclick="closeForgotModal()" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; cursor: pointer;">Cancel</button>
                <button onclick="sendResetLink()" style="flex: 1; padding: 12px; background: linear-gradient(135deg, #00D897, #00B8A0); border: none; border-radius: 12px; color: white; cursor: pointer;">Send Reset Link</button>
            </div>
        </div>
    </div>

    <!-- Scripts - Load in correct order -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
