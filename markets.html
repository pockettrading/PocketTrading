<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Markets - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        /* Guest Buttons */
        .guest-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-login {
            background: transparent;
            border: 1px solid rgba(0, 216, 151, 0.5);
            color: #00D897;
        }
        .btn-register {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
        }

        /* User Section - Logged In */
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
        }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #8B93A5;
            font-size: 14px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label { font-size: 13px; color: #8B93A5; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-change { font-size: 12px; margin-top: 4px; }
        .positive { color: #00D897; }
        .negative { color: #FF4757; }

        /* Filters Bar */
        .filters-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .category-filters { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
            border-color: transparent;
        }
        .search-input {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            width: 250px;
        }

        /* Markets Table */
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow-x: auto;
        }
        .markets-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        .markets-table th, .markets-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .markets-table th {
            color: #8B93A5;
            font-weight: 500;
            font-size: 13px;
        }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { font-size: 28px; }
        .coin-name { font-weight: 600; }
        .coin-symbol { font-size: 11px; color: #8B93A5; }
        .tradingview-btn {
            padding: 6px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 20px;
            color: #00D897;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .tradingview-btn:hover {
            background: rgba(0, 216, 151, 0.3);
        }
        .last-updated {
            text-align: right;
            font-size: 11px;
            color: #5A6475;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .nav-links, .guest-buttons, .user-section { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-value { font-size: 18px; }
            .filters-bar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div id="rightNav"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="main-content">
        <div class="page-header">
            <h1>Markets</h1>
            <p>Explore and trade top cryptocurrencies with real-time prices</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card"><div class="stat-label">Total Market Cap</div><div class="stat-value" id="totalMarketCap">$2.34T</div><div class="stat-change positive" id="marketCapChange">+2.4%</div></div>
            <div class="stat-card"><div class="stat-label">24h Volume</div><div class="stat-value" id="totalVolume">$68.5B</div></div>
            <div class="stat-card"><div class="stat-label">BTC Dominance</div><div class="stat-value" id="btcDominance">48.2%</div></div>
            <div class="stat-card"><div class="stat-label">Active Coins</div><div class="stat-value" id="activeCoins">150+</div></div>
        </div>

        <div class="filters-bar">
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">All Coins</button>
                <button class="filter-btn" data-category="large">Large Cap</button>
                <button class="filter-btn" data-category="mid">Mid Cap</button>
                <button class="filter-btn" data-category="defi">DeFi</button>
                <button class="filter-btn" data-category="meme">Meme Coins</button>
            </div>
            <input type="text" id="marketSearch" class="search-input" placeholder="Search cryptocurrency...">
        </div>

        <div class="table-container">
            <table class="markets-table">
                <thead>
                    <tr>
                        <th>Coin</th>
                        <th>Price</th>
                        <th>24h Change</th>
                        <th>Volume</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="marketsTableBody">
                    <tr><td colspan="5" style="text-align:center; padding:40px;">Loading markets...<\/td><\/tr>
                </tbody>
            </table>
        </div>
        <div class="last-updated" id="lastUpdated">Last updated: --</div>
    </div>

    <!-- SCRIPTS - CORRECT ORDER IS CRITICAL -->
    <!-- 1. Supabase CDN (MUST BE FIRST) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Database Wrapper -->
    <script src="js/supabase-db.js"></script>
    <!-- 3. Authentication -->
    <script src="js/auth.js"></script>
    <!-- 4. Markets Page Script -->
    <script src="js/markets.js"></script>
</body>
</html>
