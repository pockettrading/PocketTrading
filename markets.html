<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Markets - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        /* User Section - Logged In */
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
        }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }

        /* Guest Buttons */
        .guest-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-login {
            background: transparent;
            border: 1px solid rgba(0, 216, 151, 0.5);
            color: #00D897;
        }
        .btn-login:hover {
            background: rgba(0, 216, 151, 0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 216, 151, 0.3);
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Page Header */
        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #8B93A5;
            font-size: 14px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label { font-size: 13px; color: #8B93A5; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-change { font-size: 12px; margin-top: 4px; }
        .positive { color: #00D897; }
        .negative { color: #FF4757; }

        /* Filters Bar */
        .filters-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .category-filters { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
            border-color: transparent;
        }
        .search-input {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            width: 250px;
        }
        .search-input:focus {
            outline: none;
            border-color: #00D897;
        }

        /* Markets Table */
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow-x: auto;
        }
        .markets-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        .markets-table th, .markets-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .markets-table th {
            color: #8B93A5;
            font-weight: 500;
            font-size: 13px;
        }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { font-size: 28px; }
        .coin-name { font-weight: 600; }
        .coin-symbol { font-size: 11px; color: #8B93A5; }
        .tradingview-btn {
            padding: 6px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 20px;
            color: #00D897;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .tradingview-btn:hover {
            background: rgba(0, 216, 151, 0.3);
        }
        .last-updated {
            text-align: right;
            font-size: 11px;
            color: #5A6475;
            margin-top: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links, .user-section, .guest-buttons { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-value { font-size: 18px; }
            .filters-bar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div id="rightNav"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="main-content">
        <div class="page-header">
            <h1>Markets</h1>
            <p>Explore and trade top cryptocurrencies with real-time prices</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Market Cap</div>
                <div class="stat-value" id="totalMarketCap">$2.34T</div>
                <div class="stat-change positive" id="marketCapChange">+2.4%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">24h Volume</div>
                <div class="stat-value" id="totalVolume">$68.5B</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">BTC Dominance</div>
                <div class="stat-value" id="btcDominance">48.2%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Coins</div>
                <div class="stat-value" id="activeCoins">150+</div>
            </div>
        </div>

        <div class="filters-bar">
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">All Coins</button>
                <button class="filter-btn" data-category="large">Large Cap</button>
                <button class="filter-btn" data-category="mid">Mid Cap</button>
                <button class="filter-btn" data-category="defi">DeFi</button>
                <button class="filter-btn" data-category="meme">Meme Coins</button>
            </div>
            <input type="text" id="marketSearch" class="search-input" placeholder="Search cryptocurrency...">
        </div>

        <div class="table-container">
            <table class="markets-table">
                <thead>
                    <tr>
                        <th>Coin</th>
                        <th>Price</th>
                        <th>24h Change</th>
                        <th>Market Cap</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="marketsTableBody">
                    <tr><td colspan="5" style="text-align:center; padding: 40px;">Loading markets...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="last-updated" id="lastUpdated">Last updated: --</div>
    </div>

    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let allMarkets = [];
        let currentCategory = 'all';
        let searchTerm = '';
        let priceUpdateInterval = null;

        const coins = [
            { symbol: 'BTC', name: 'Bitcoin', icon: '₿', price: 78312.00, change: 2.34, marketCap: '1.56T', category: 'large' },
            { symbol: 'ETH', name: 'Ethereum', icon: 'Ξ', price: 2297.32, change: 1.29, marketCap: '276B', category: 'large' },
            { symbol: 'BNB', name: 'Binance Coin', icon: 'B', price: 615.81, change: 0.21, marketCap: '94B', category: 'large' },
            { symbol: 'SOL', name: 'Solana', icon: '◎', price: 168.42, change: 5.23, marketCap: '72B', category: 'large' },
            { symbol: 'XRP', name: 'Ripple', icon: 'X', price: 0.624, change: -0.45, marketCap: '33.5B', category: 'large' },
            { symbol: 'ADA', name: 'Cardano', icon: 'A', price: 0.483, change: -1.23, marketCap: '17.1B', category: 'mid' },
            { symbol: 'DOGE', name: 'Dogecoin', icon: 'Ð', price: 0.162, change: 8.91, marketCap: '23.2B', category: 'meme' },
            { symbol: 'AVAX', name: 'Avalanche', icon: 'A', price: 42.15, change: 3.45, marketCap: '15.8B', category: 'mid' },
            { symbol: 'MATIC', name: 'Polygon', icon: 'M', price: 0.89, change: -2.11, marketCap: '8.7B', category: 'mid' },
            { symbol: 'SHIB', name: 'Shiba Inu', icon: '🐕', price: 0.000023, change: 4.56, marketCap: '13.5B', category: 'meme' },
            { symbol: 'UNI', name: 'Uniswap', icon: 'U', price: 11.23, change: -0.89, marketCap: '6.5B', category: 'defi' },
            { symbol: 'LINK', name: 'Chainlink', icon: 'L', price: 18.34, change: 1.56, marketCap: '10.2B', category: 'defi' }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            await waitForAuth();
            if (typeof auth !== 'undefined') currentUser = auth.getUser();
            setupNavigation();
            allMarkets = [...coins];
            renderMarkets();
            updateStats();
            setupEventListeners();
            startPriceUpdates();
        });

        function waitForAuth() {
            return new Promise((resolve) => {
                if (typeof auth !== 'undefined') resolve();
                else setTimeout(() => resolve(), 100);
            });
        }

        function setupNavigation() {
            const navLinks = document.getElementById('navLinks');
            const rightNav = document.getElementById('rightNav');
            const mobileMenu = document.getElementById('mobileMenu');
            
            if (currentUser) {
                const isAdmin = currentUser.email === 'ephremgojo@gmail.com';
                const userName = currentUser.name || currentUser.email.split('@')[0];
                
                // Desktop navigation for logged-in users
                navLinks.innerHTML = `
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="markets.html" class="nav-link active">Markets</a>
                    <a href="trades.html" class="nav-link">Trades</a>
                    <a href="profile.html" class="nav-link">My Profile</a>
                `;
                
                rightNav.innerHTML = `
                    <div class="user-section">
                        <div class="user-info">
                            <div class="user-avatar">${userName.charAt(0).toUpperCase()}</div>
                            <div class="user-name">${userName}${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>
                        </div>
                        ${isAdmin ? '<a href="admin.html" class="admin-link">⚙️ Admin Panel</a>' : ''}
                        <button class="logout-btn" onclick="handleLogout()">Logout</button>
                    </div>
                `;
                
                // Mobile menu for logged-in users
                mobileMenu.innerHTML = `
                    <a href="index.html" class="mobile-nav-link">🏠 Home</a>
                    <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
                    <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
                    <a href="profile.html" class="mobile-nav-link">👤 My Profile</a>
                    ${isAdmin ? '<a href="admin.html" class="mobile-nav-link">⚙️ Admin Panel</a>' : ''}
                    <button class="logout-btn" style="margin-top:12px;" onclick="handleLogout()">Logout</button>
                `;
            } else {
                // Desktop navigation for guests
                navLinks.innerHTML = `
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="markets.html" class="nav-link active">Markets</a>
                    <a href="trades.html" class="nav-link">Trades</a>
                `;
                
                rightNav.innerHTML = `
                    <div class="guest-buttons">
                        <a href="login.html" class="btn-login">Login</a>
                        <a href="login.html" class="btn-register">Register</a>
                    </div>
                `;
                
                // Mobile menu for guests
                mobileMenu.innerHTML = `
                    <a href="index.html" class="mobile-nav-link">🏠 Home</a>
                    <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
                    <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
                    <a href="login.html" class="mobile-nav-link">🔐 Login</a>
                    <a href="login.html" class="mobile-nav-link">📝 Register</a>
                `;
            }
        }

        function formatPrice(p) {
            if (p < 1) return p.toFixed(6);
            return p.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderMarkets() {
            let filtered = allMarkets.filter(m => currentCategory === 'all' || m.category === currentCategory);
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    m.symbol.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            const tbody = document.getElementById('marketsTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px;">No markets found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(m => `
                <tr>
                    <td>
                        <div class="coin-info">
                            <span class="coin-icon">${m.icon}</span>
                            <div>
                                <div class="coin-name">${m.name}</div>
                                <div class="coin-symbol">${m.symbol}/USD</div>
                            </div>
                        </div>
                    </td>
                    <td>$${formatPrice(m.price)}</td>
                    <td class="${m.change >= 0 ? 'positive' : 'negative'}">
                        ${m.change >= 0 ? '▲' : '▼'} ${Math.abs(m.change)}%
                    </td>
                    <td>${m.marketCap}</td>
                    <td>
                        <button class="tradingview-btn" onclick="openTradingView('${m.symbol}')">TradingView</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            const totalCap = allMarkets.reduce((s, m) => {
                let val = parseFloat(m.marketCap);
                if (m.marketCap.includes('T')) val = parseFloat(m.marketCap) * 1000;
                return s + (isNaN(val) ? 0 : val);
            }, 0);
            document.getElementById('totalMarketCap').innerHTML = `$${(totalCap / 1000).toFixed(2)}T`;
            
            const btcPrice = allMarkets.find(m => m.symbol === 'BTC')?.price || 78000;
            document.getElementById('btcDominance').textContent = `${((btcPrice * 19.5) / 1000).toFixed(1)}%`;
            document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        function openTradingView(symbol) {
            window.location.href = `trading-view.html?symbol=${symbol}`;
        }

        function setupEventListeners() {
            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderMarkets();
                });
            });
            
            // Search input
            const searchInput = document.getElementById('marketSearch');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchTerm = e.target.value;
                    renderMarkets();
                });
            }
            
            // Mobile menu
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            if (mobileBtn && mobileMenu) {
                mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('show'));
            }
        }

        function startPriceUpdates() {
            priceUpdateInterval = setInterval(() => {
                allMarkets = allMarkets.map(m => ({
                    ...m,
                    price: m.price * (1 + (Math.random() - 0.5) * 0.002),
                    change: m.change + (Math.random() - 0.5) * 0.2
                }));
                renderMarkets();
                updateStats();
            }, 30000);
        }

        window.openTradingView = openTradingView;
        window.handleLogout = function() {
            if (typeof auth !== 'undefined' && auth.logout) {
                auth.logout();
            } else {
                localStorage.removeItem('pocket_user');
                sessionStorage.removeItem('pocket_user');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
