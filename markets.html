<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Markets - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        .user-section { display: flex; align-items: center; gap: 16px; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name { font-size: 14px; font-weight: 600; }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.1);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }
        .guest-buttons { display: flex; gap: 12px; }
        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
        }
        .btn-login {
            background: transparent;
            border: 1px solid rgba(0, 216, 151, 0.5);
            color: #00D897;
        }
        .btn-register {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label { font-size: 13px; color: #8B93A5; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-change { font-size: 12px; margin-top: 4px; }
        .positive { color: #00D897; }
        .negative { color: #FF4757; }

        /* Filters */
        .filters-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .category-filters { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
            border-color: transparent;
        }
        .search-input {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            width: 250px;
        }

        /* Markets Table */
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow-x: auto;
        }
        .markets-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        .markets-table th, .markets-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .markets-table th { color: #8B93A5; font-weight: 500; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { font-size: 28px; }
        .coin-name { font-weight: 600; }
        .coin-symbol { font-size: 11px; color: #8B93A5; }
        .tradingview-btn {
            padding: 6px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 20px;
            color: #00D897;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .tradingview-btn:hover {
            background: rgba(0, 216, 151, 0.3);
        }
        .last-updated {
            text-align: right;
            font-size: 11px;
            color: #5A6475;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .nav-links, .user-section { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-value { font-size: 18px; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="home.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link active">Markets</a>
                <a href="trades.html" class="nav-link">Trades</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </div>
            <div class="user-section" id="userSection"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <a href="home.html" class="mobile-nav-link">🏠 Home</a>
        <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
        <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
        <a href="profile.html" class="mobile-nav-link">👤 My Profile</a>
        <div id="mobileUserSection"></div>
    </div>

    <main class="main-content">
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-label">Total Market Cap</div><div class="stat-value" id="totalMarketCap">$2.34T</div><div class="stat-change positive" id="marketCapChange">+2.4%</div></div>
            <div class="stat-card"><div class="stat-label">24h Volume</div><div class="stat-value" id="totalVolume">$68.5B</div></div>
            <div class="stat-card"><div class="stat-label">BTC Dominance</div><div class="stat-value" id="btcDominance">48.2%</div></div>
            <div class="stat-card"><div class="stat-label">Active Coins</div><div class="stat-value" id="activeCoins">150+</div></div>
        </div>

        <div class="filters-bar">
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">All Coins</button>
                <button class="filter-btn" data-category="large">Large Cap</button>
                <button class="filter-btn" data-category="mid">Mid Cap</button>
                <button class="filter-btn" data-category="defi">DeFi</button>
                <button class="filter-btn" data-category="meme">Meme Coins</button>
            </div>
            <input type="text" id="marketSearch" class="search-input" placeholder="Search cryptocurrency...">
        </div>

        <div class="table-container">
            <table class="markets-table">
                <thead><tr><th>Coin</th><th>Price</th><th>24h Change</th><th>Market Cap</th><th>Action</th></tr></thead>
                <tbody id="marketsTableBody"><tr><td colspan="5" style="text-align:center;">Loading markets...</td></tr></tbody>
            </table>
        </div>
        <div class="last-updated" id="lastUpdated">Last updated: --</div>
    </main>

    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let allMarkets = [];
        let currentCategory = 'all';
        let searchTerm = '';

        const coins = [
            { symbol: 'BTC', name: 'Bitcoin', icon: '₿', price: 78312.00, change: 2.34, marketCap: '1.56T', category: 'large' },
            { symbol: 'ETH', name: 'Ethereum', icon: 'Ξ', price: 2297.32, change: 1.29, marketCap: '276B', category: 'large' },
            { symbol: 'BNB', name: 'Binance Coin', icon: 'B', price: 615.81, change: 0.21, marketCap: '94B', category: 'large' },
            { symbol: 'SOL', name: 'Solana', icon: '◎', price: 168.42, change: 5.23, marketCap: '72B', category: 'large' },
            { symbol: 'XRP', name: 'Ripple', icon: 'X', price: 0.624, change: -0.45, marketCap: '33.5B', category: 'large' },
            { symbol: 'ADA', name: 'Cardano', icon: 'A', price: 0.483, change: -1.23, marketCap: '17.1B', category: 'mid' },
            { symbol: 'DOGE', name: 'Dogecoin', icon: 'Ð', price: 0.162, change: 8.91, marketCap: '23.2B', category: 'meme' },
            { symbol: 'AVAX', name: 'Avalanche', icon: 'A', price: 42.15, change: 3.45, marketCap: '15.8B', category: 'mid' },
            { symbol: 'MATIC', name: 'Polygon', icon: 'M', price: 0.89, change: -2.11, marketCap: '8.7B', category: 'mid' },
            { symbol: 'SHIB', name: 'Shiba Inu', icon: '🐕', price: 0.000023, change: 4.56, marketCap: '13.5B', category: 'meme' },
            { symbol: 'UNI', name: 'Uniswap', icon: 'U', price: 11.23, change: -0.89, marketCap: '6.5B', category: 'defi' },
            { symbol: 'AAVE', name: 'Aave', icon: 'A', price: 98.45, change: 2.34, marketCap: '1.4B', category: 'defi' }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            await waitForAuth();
            if (typeof auth !== 'undefined') currentUser = auth.getUser();
            setupNavigation();
            allMarkets = [...coins];
            renderMarkets();
            updateStats();
            setupEventListeners();
            startPriceUpdates();
        });

        function waitForAuth() { return new Promise(r => { if (typeof auth !== 'undefined') r(); else setTimeout(() => r(), 100); }); }

        function setupNavigation() {
            const userSection = document.getElementById('userSection');
            const mobileUserSection = document.getElementById('mobileUserSection');
            if (currentUser) {
                const isAdmin = currentUser.email === 'ephremgojo@gmail.com';
                const userName = currentUser.name || currentUser.email.split('@')[0];
                userSection.innerHTML = `<div class="user-info"><div class="user-avatar">${userName.charAt(0)}</div><div class="user-name">${userName}${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div></div>${isAdmin ? '<a href="admin.html" class="admin-link">⚙️ Admin</a>' : ''}<button class="logout-btn" onclick="handleLogout()">Logout</button>`;
                mobileUserSection.innerHTML = `<div style="padding:12px;color:white;"><strong>${userName}</strong> ${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>${isAdmin ? '<a href="admin.html" class="mobile-nav-link">⚙️ Admin</a>' : ''}<button class="logout-btn" onclick="handleLogout()">Logout</button>`;
            } else {
                userSection.innerHTML = `<div class="guest-buttons"><a href="login.html" class="btn-login">Login</a><a href="login.html" class="btn-register">Register</a></div>`;
                mobileUserSection.innerHTML = `<a href="login.html" class="mobile-nav-link">🔐 Login</a><a href="login.html" class="mobile-nav-link">📝 Register</a>`;
            }
        }

        function renderMarkets() {
            let filtered = allMarkets.filter(m => currentCategory === 'all' || m.category === currentCategory);
            if (searchTerm) filtered = filtered.filter(m => m.name.toLowerCase().includes(searchTerm.toLowerCase()) || m.symbol.toLowerCase().includes(searchTerm));
            const tbody = document.getElementById('marketsTableBody');
            if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No markets found</td></tr>'; return; }
            tbody.innerHTML = filtered.map(m => `<tr><td><div class="coin-info"><span class="coin-icon">${m.icon}</span><div><div class="coin-name">${m.name}</div><div class="coin-symbol">${m.symbol}/USD</div></div></div></td><td>$${formatPrice(m.price)}</td><td class="${m.change >= 0 ? 'positive' : 'negative'}">${m.change >= 0 ? '▲' : '▼'} ${Math.abs(m.change)}%</td><td>${m.marketCap}</td><td><button class="tradingview-btn" onclick="openTradingView('${m.symbol}')">TradingView</button></td></tr>`).join('');
        }

        function formatPrice(p) { return p < 1 ? p.toFixed(6) : p.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

        function updateStats() {
            const totalCap = allMarkets.reduce((s, m) => s + (parseFloat(m.marketCap) || 0), 0) / 1000;
            document.getElementById('totalMarketCap').innerHTML = `$${totalCap.toFixed(2)}T`;
            document.getElementById('btcDominance').textContent = `${((allMarkets.find(m=>m.symbol==='BTC')?.price || 0) / 78000 * 100).toFixed(1)}%`;
            document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        function openTradingView(symbol) { window.location.href = `trading-view.html?symbol=${symbol}`; }

        function setupEventListeners() {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderMarkets();
            }));
            document.getElementById('marketSearch').addEventListener('input', e => { searchTerm = e.target.value; renderMarkets(); });
            document.getElementById('mobileMenuBtn').addEventListener('click', () => document.getElementById('mobileMenu').classList.toggle('show'));
        }

        function startPriceUpdates() { setInterval(() => { allMarkets = allMarkets.map(m => ({ ...m, price: m.price * (1 + (Math.random() - 0.5) * 0.002), change: m.change + (Math.random() - 0.5) * 0.2 })); renderMarkets(); updateStats(); }, 30000); }

        window.handleLogout = () => { if (auth?.logout) auth.logout(); else { localStorage.clear(); sessionStorage.clear(); window.location.href = 'home.html'; } };
        window.openTradingView = openTradingView;
    </script>
</body>
</html>
