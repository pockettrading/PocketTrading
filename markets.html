<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Markets - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        /* Guest Buttons */
        .guest-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-login {
            background: transparent;
            border: 1px solid rgba(0, 216, 151, 0.5);
            color: #00D897;
        }
        .btn-register {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
        }

        /* User Section - Logged In */
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
        }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #8B93A5;
            font-size: 14px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label { font-size: 13px; color: #8B93A5; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-change { font-size: 12px; margin-top: 4px; }
        .positive { color: #00D897; }
        .negative { color: #FF4757; }

        /* Filters Bar */
        .filters-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .category-filters { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
            border-color: transparent;
        }
        .search-input {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            width: 250px;
        }

        /* Markets Table */
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow-x: auto;
        }
        .markets-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        .markets-table th, .markets-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .markets-table th {
            color: #8B93A5;
            font-weight: 500;
            font-size: 13px;
        }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { font-size: 28px; }
        .coin-name { font-weight: 600; }
        .coin-symbol { font-size: 11px; color: #8B93A5; }
        .tradingview-btn {
            padding: 6px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 20px;
            color: #00D897;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .tradingview-btn:hover {
            background: rgba(0, 216, 151, 0.3);
        }
        .last-updated {
            text-align: right;
            font-size: 11px;
            color: #5A6475;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .nav-links, .guest-buttons, .user-section { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-value { font-size: 18px; }
            .filters-bar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div id="rightNav"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="main-content">
        <div class="page-header">
            <h1>Markets</h1>
            <p>Explore and trade top cryptocurrencies with real-time prices</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card"><div class="stat-label">Total Market Cap</div><div class="stat-value" id="totalMarketCap">$2.34T</div><div class="stat-change positive" id="marketCapChange">+2.4%</div></div>
            <div class="stat-card"><div class="stat-label">24h Volume</div><div class="stat-value" id="totalVolume">$68.5B</div></div>
            <div class="stat-card"><div class="stat-label">BTC Dominance</div><div class="stat-value" id="btcDominance">48.2%</div></div>
            <div class="stat-card"><div class="stat-label">Active Coins</div><div class="stat-value" id="activeCoins">150+</div></div>
        </div>

        <div class="filters-bar">
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">All Coins</button>
                <button class="filter-btn" data-category="large">Large Cap</button>
                <button class="filter-btn" data-category="mid">Mid Cap</button>
                <button class="filter-btn" data-category="defi">DeFi</button>
                <button class="filter-btn" data-category="meme">Meme Coins</button>
            </div>
            <input type="text" id="marketSearch" class="search-input" placeholder="Search cryptocurrency...">
        </div>

        <div class="table-container">
            <table class="markets-table">
                <thead>
                    <tr>
                        <th>Coin</th>
                        <th>Price</th>
                        <th>24h Change</th>
                        <th>Volume</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="marketsTableBody">
                    <tr><td colspan="5" style="text-align:center; padding:40px;">Loading markets...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="last-updated" id="lastUpdated">Last updated: --</div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        let currentUser = null;
        let allMarkets = [];
        let currentCategory = 'all';
        let searchTerm = '';
        let priceUpdateInterval = null;

        // Default market data
        const defaultMarkets = [
            { symbol: 'BTC', name: 'Bitcoin', icon: '₿', price: 78312.00, change_24h: 2.34, volume: '32.5B', category: 'large' },
            { symbol: 'ETH', name: 'Ethereum', icon: 'Ξ', price: 2297.32, change_24h: 1.29, volume: '18.2B', category: 'large' },
            { symbol: 'SOL', name: 'Solana', icon: '◎', price: 168.42, change_24h: 5.23, volume: '4.8B', category: 'large' },
            { symbol: 'XRP', name: 'Ripple', icon: 'X', price: 0.624, change_24h: -0.45, volume: '1.2B', category: 'large' },
            { symbol: 'DOGE', name: 'Dogecoin', icon: 'Ð', price: 0.162, change_24h: 8.91, volume: '892M', category: 'meme' },
            { symbol: 'BNB', name: 'Binance Coin', icon: 'B', price: 615.81, change_24h: 0.21, volume: '2.1B', category: 'large' },
            { symbol: 'ADA', name: 'Cardano', icon: 'A', price: 0.483, change_24h: -1.23, volume: '456M', category: 'mid' }
        ];

        // Function to update navbar based on user state
        function updateNavbar() {
            const navLinks = document.getElementById('navLinks');
            const rightNav = document.getElementById('rightNav');
            const mobileMenu = document.getElementById('mobileMenu');
            
            if (!navLinks) return;
            
            console.log('Updating navbar, currentUser:', currentUser);
            
            if (currentUser) {
                const isAdmin = currentUser.email === 'ephremgojo@gmail.com';
                const userName = currentUser.name || currentUser.email.split('@')[0];
                
                // Desktop nav links for logged-in users
                navLinks.innerHTML = `
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="markets.html" class="nav-link active">Markets</a>
                    <a href="trades.html" class="nav-link">Trades</a>
                    <a href="profile.html" class="nav-link">My Profile</a>
                `;
                
                // Desktop right section for logged-in users
                rightNav.innerHTML = `
                    <div class="user-section">
                        <div class="user-info">
                            <div class="user-avatar">${userName.charAt(0).toUpperCase()}</div>
                            <div class="user-name">${userName}${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>
                        </div>
                        ${isAdmin ? '<a href="admin.html" class="admin-link">⚙️ Admin Panel</a>' : ''}
                        <button class="logout-btn" onclick="logout()">Logout</button>
                    </div>
                `;
                
                // Mobile menu for logged-in users
                mobileMenu.innerHTML = `
                    <a href="index.html" class="mobile-nav-link">🏠 Home</a>
                    <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
                    <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
                    <a href="profile.html" class="mobile-nav-link">👤 My Profile</a>
                    ${isAdmin ? '<a href="admin.html" class="mobile-nav-link">⚙️ Admin Panel</a>' : ''}
                    <button class="logout-btn" style="margin-top:12px;" onclick="logout()">Logout</button>
                `;
            } else {
                // Desktop nav links for guests
                navLinks.innerHTML = `
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="markets.html" class="nav-link active">Markets</a>
                    <a href="trades.html" class="nav-link">Trades</a>
                `;
                
                // Desktop right section for guests
                rightNav.innerHTML = `
                    <div class="guest-buttons">
                        <a href="login.html" class="btn-login">Login</a>
                        <a href="login.html" class="btn-register">Register</a>
                    </div>
                `;
                
                // Mobile menu for guests
                mobileMenu.innerHTML = `
                    <a href="index.html" class="mobile-nav-link">🏠 Home</a>
                    <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
                    <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
                    <a href="login.html" class="mobile-nav-link">🔐 Login</a>
                    <a href="login.html" class="mobile-nav-link">📝 Register</a>
                `;
            }
        }

        // Format price
        function formatPrice(price) {
            if (!price && price !== 0) return '0.00';
            if (price < 1) return price.toFixed(4);
            return price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Render markets table
        function renderMarkets() {
            let filtered = allMarkets.filter(m => currentCategory === 'all' || m.category === currentCategory);
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    m.symbol.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            const tbody = document.getElementById('marketsTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">No markets found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(m => `
                <tr>
                    <td>
                        <div class="coin-info">
                            <span class="coin-icon">${m.icon || '📈'}</span>
                            <div>
                                <div class="coin-name">${m.name}</div>
                                <div class="coin-symbol">${m.symbol}/USD</div>
                            </div>
                        </div>
                    </td>
                    <td>$${formatPrice(m.price)}</td>
                    <td class="${m.change_24h >= 0 ? 'positive' : 'negative'}">
                        ${m.change_24h >= 0 ? '▲' : '▼'} ${Math.abs(m.change_24h)}%
                    </td>
                    <td>${m.volume || '—'}</td>
                    <td>
                        <button class="tradingview-btn" onclick="openTradingView('${m.symbol}')">TradingView</button>
                    </td>
                </tr>
            `).join('');
        }

        // Update market stats
        function updateStats() {
            const totalChange = allMarkets.reduce((sum, m) => sum + (m.change_24h || 0), 0) / allMarkets.length;
            const totalVolume = allMarkets.reduce((sum, m) => {
                let vol = 0;
                if (typeof m.volume === 'string') {
                    if (m.volume.includes('B')) vol = parseFloat(m.volume);
                    else if (m.volume.includes('M')) vol = parseFloat(m.volume) / 1000;
                } else {
                    vol = m.volume || 0;
                }
                return sum + vol;
            }, 0);
            
            const btcMarket = allMarkets.find(m => m.symbol === 'BTC');
            const btcPrice = btcMarket ? btcMarket.price : 78312;
            
            const marketCapEl = document.getElementById('totalMarketCap');
            const volumeEl = document.getElementById('totalVolume');
            const changeEl = document.getElementById('marketCapChange');
            
            if (marketCapEl) marketCapEl.innerHTML = `$${(btcPrice * 19.5 / 1e12).toFixed(2)}T`;
            if (volumeEl) volumeEl.innerHTML = `$${totalVolume.toFixed(1)}B`;
            if (changeEl) {
                changeEl.innerHTML = `${totalChange >= 0 ? '+' : ''}${totalChange.toFixed(1)}%`;
                changeEl.className = `stat-change ${totalChange >= 0 ? 'positive' : 'negative'}`;
            }
            
            const lastUpdated = document.getElementById('lastUpdated');
            if (lastUpdated) {
                lastUpdated.innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
            }
        }

        // Load markets from Supabase
        async function loadMarkets() {
            try {
                if (typeof supabaseDB !== 'undefined' && supabaseDB.supabase) {
                    const dbMarkets = await supabaseDB.getAllMarkets();
                    if (dbMarkets && dbMarkets.length > 0) {
                        allMarkets = dbMarkets;
                    } else {
                        allMarkets = [...defaultMarkets];
                    }
                } else {
                    allMarkets = [...defaultMarkets];
                }
                renderMarkets();
                updateStats();
            } catch (error) {
                console.error('Error loading markets:', error);
                allMarkets = [...defaultMarkets];
                renderMarkets();
                updateStats();
            }
        }

        // Start real-time price updates
        function startPriceUpdates() {
            priceUpdateInterval = setInterval(() => {
                allMarkets = allMarkets.map(m => ({
                    ...m,
                    price: m.price * (1 + (Math.random() - 0.5) * 0.002),
                    change_24h: m.change_24h + (Math.random() - 0.5) * 0.2
                }));
                renderMarkets();
                updateStats();
            }, 30000);
        }

        // Open TradingView chart page
        function openTradingView(symbol) {
            window.location.href = `trading-view.html?symbol=${symbol}`;
        }

        // Setup event listeners
        function setupEventListeners() {
            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderMarkets();
                });
            });
            
            // Search input
            const searchInput = document.getElementById('marketSearch');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchTerm = e.target.value;
                    renderMarkets();
                });
            }
            
            // Mobile menu
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            if (mobileBtn && mobileMenu) {
                mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('show'));
            }
        }

        // Get user from sessionStorage directly (fallback)
        async function getUserFromSession() {
            const userId = sessionStorage.getItem('pocket_user_id') || localStorage.getItem('pocket_user_id');
            if (userId) {
                try {
                    const user = await supabaseDB.getUserById(parseInt(userId));
                    if (user) {
                        user.isAdmin = (user.email === 'ephremgojo@gmail.com');
                        return user;
                    }
                } catch (e) {
                    console.error('Error fetching user:', e);
                }
            }
            return null;
        }

        // Initialize page
        async function init() {
            // Wait for auth to be ready
            await new Promise(resolve => {
                const check = setInterval(() => {
                    if (typeof auth !== 'undefined') {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
                setTimeout(() => {
                    clearInterval(check);
                    resolve();
                }, 3000);
            });
            
            // Try to get user from auth
            currentUser = auth.getUser();
            
            // If auth returns null, try sessionStorage directly
            if (!currentUser) {
                currentUser = await getUserFromSession();
                if (currentUser && typeof auth !== 'undefined') {
                    auth.currentUser = currentUser;
                }
            }
            
            console.log('Current user:', currentUser);
            
            // Update navbar immediately
            updateNavbar();
            
            // Load markets
            await loadMarkets();
            setupEventListeners();
            startPriceUpdates();
            
            // Listen for auth state changes
            window.addEventListener('authStateChanged', (e) => {
                console.log('Auth state changed:', e.detail);
                currentUser = e.detail.user;
                updateNavbar();
            });
        }

        // Logout function
        window.logout = function() {
            if (typeof auth !== 'undefined' && auth.logout) {
                auth.logout();
            } else {
                sessionStorage.removeItem('pocket_user_id');
                localStorage.removeItem('pocket_user_id');
                window.location.href = 'index.html';
            }
        };
        
        window.openTradingView = openTradingView;

        // Start the app
        init();
    </script>
</body>
</html>
