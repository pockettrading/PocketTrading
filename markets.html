<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .signup-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        /* Markets Header */
        .markets-header {
            margin-bottom: 2rem;
        }

        .markets-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .markets-header p {
            color: var(--text-secondary);
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-change {
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .filter-tab {
            padding: 8px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 20px;
            font-weight: 500;
        }

        .filter-tab:hover {
            color: var(--primary);
            background: rgba(247, 147, 26, 0.1);
        }

        .filter-tab.active {
            color: var(--primary);
            background: rgba(247, 147, 26, 0.1);
        }

        /* Search Bar */
        .search-bar {
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Market Table */
        .market-table-container {
            background: var(--card-bg);
            border-radius: 16px;
            overflow-x: auto;
        }

        .market-table {
            width: 100%;
            border-collapse: collapse;
        }

        .market-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }

        .market-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .market-table tbody tr {
            cursor: pointer;
            transition: all 0.3s;
        }

        .market-table tbody tr:hover {
            background: var(--card-hover);
        }

        /* Crypto Info */
        .crypto-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .crypto-icon {
            font-size: 1.5rem;
        }

        .crypto-name {
            font-weight: 600;
        }

        .crypto-symbol {
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* Price Change */
        .price-change {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 500;
        }

        .price-change.positive {
            background: rgba(0, 216, 151, 0.1);
            color: var(--success);
        }

        .price-change.negative {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .action-icon:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        @media (max-width: 968px) {
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .container {
                padding: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                justify-content: center;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .stats-cards {
                grid-template-columns: 1fr;
            }
            
            .filter-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
            
            .market-table th,
            .market-table td {
                padding: 0.75rem;
                font-size: 0.75rem;
            }
            
            .action-buttons {
                gap: 0.25rem;
            }
            
            .action-icon {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link" style="color: var(--primary);">Markets</a>
                <a href="trade.html" class="nav-link">Trades</a>
            </div>
            <a href="register.html" class="signup-btn">Sign Up</a>
        </div>

        <!-- Markets Header -->
        <div class="markets-header">
            <h1>Cryptocurrency Prices</h1>
            <p>Track live cryptocurrency prices and market data</p>
        </div>

        <!-- Market Stats Cards -->
        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-label">Total Market Cap</div>
                <div class="stat-value" id="totalMarketCap">$2.03T</div>
                <div class="stat-change positive" id="marketCapChange">+2.5%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">24h Volume</div>
                <div class="stat-value" id="totalVolume">$57.77B</div>
                <div class="stat-change positive" id="volumeChange">+5.2%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">BTC Dominance</div>
                <div class="stat-value" id="btcDominance">74.8%</div>
                <div class="stat-change negative" id="dominanceChange">-0.3%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Coins</div>
                <div class="stat-value" id="activeCoins">18</div>
                <div class="stat-change">+2 this week</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Coins</button>
            <button class="filter-tab" data-filter="large">Large Cap</button>
            <button class="filter-tab" data-filter="mid">Mid Cap</button>
            <button class="filter-tab" data-filter="defi">DeFi</button>
            <button class="filter-tab" data-filter="meme">Meme Coins</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search cryptocurrency (BTC, ETH, DOGE, etc.)">
        </div>

        <!-- Market Table -->
        <div class="market-table-container">
            <table class="market-table">
                <thead>
                    <tr>
                        <th>Coin</th>
                        <th>Price</th>
                        <th>24h Change</th>
                        <th>Market Cap</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="marketTableBody">
                    <tr>
                        <td colspan="5" class="loading-state">Loading market data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/markets.js"></script>
</body>
</html>
