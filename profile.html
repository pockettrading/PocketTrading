<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* User Info in Top Right */
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .username {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .logout-link {
            color: var(--danger);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-link:hover {
            text-decoration: underline;
        }

        /* Auth Buttons */
        .auth-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .login-btn {
            background: transparent;
            color: var(--primary);
            padding: 8px 20px;
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .login-btn:hover {
            background: rgba(247, 147, 26, 0.1);
            transform: translateY(-2px);
        }

        .signup-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        /* Admin Badge */
        .admin-badge {
            background: linear-gradient(135deg, var(--danger), #ff6b6b);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 20px;
            max-width: 500px;
            margin: 2rem auto;
        }

        .login-prompt h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .login-prompt p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Profile Layout - Luno Style */
        .profile-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        /* Left Sidebar - Menu Only */
        .profile-sidebar {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            height: fit-content;
        }

        .sidebar-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .menu-item:hover {
            background: var(--card-hover);
            color: var(--primary);
        }

        .menu-item.active {
            background: rgba(247, 147, 26, 0.1);
            color: var(--primary);
        }

        .menu-icon {
            font-size: 1.1rem;
        }

        /* Main Content */
        .profile-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .content-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        /* Personal Information Card */
        .info-card {
            background: var(--darker-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .info-value {
            font-weight: 500;
            font-size: 0.85rem;
        }

        /* Balance and KYC Section */
        .balance-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--darker-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .balance-item {
            flex: 1;
        }

        .balance-label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-bottom: 0.25rem;
        }

        .balance-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .kyc-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .kyc-pending {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning);
        }

        .kyc-verified {
            background: rgba(0, 216, 151, 0.2);
            color: var(--success);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-deposit {
            flex: 1;
            background: linear-gradient(135deg, var(--success), #00b894);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-withdraw {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-deposit:hover, .btn-withdraw:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Trading Statistics */
        .stats-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .stat-item {
            background: var(--darker-bg);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-tertiary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .stat-value.positive {
            color: var(--success);
        }

        .stat-value.negative {
            color: var(--danger);
        }

        /* Trade History Table */
        .trade-history-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.75rem;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .trade-type-buy {
            color: var(--success);
        }

        .trade-type-sell {
            color: var(--danger);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: var(--primary);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

        .support-contact {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .contact-card {
            background: var(--darker-bg);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }

        .contact-label {
            font-size: 0.65rem;
            color: var(--text-tertiary);
            margin-bottom: 0.25rem;
        }

        .contact-value {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .faq-item {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .faq-question {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
        }

        .faq-answer {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        @media (max-width: 968px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
            
            .user-info {
                justify-content: center;
            }
            
            .balance-section {
                flex-direction: column;
                text-align: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .support-contact {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trade.html" class="nav-link">Trades</a>
                <a href="profile.html" class="nav-link" style="color: var(--primary);">My Profile</a>
            </div>
            <div class="user-info" id="userInfo"></div>
        </div>

        <div id="profileContent">
            <!-- Content will be populated by JavaScript based on login status -->
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
