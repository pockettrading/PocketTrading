<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trades - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0F1420 0%, #0A0F1A 100%);
            border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #8B93A5;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        .nav-icon { font-size: 20px; }

        .user-info-sidebar {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255,71,87,0.2);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 8px;
            color: #FF4757;
            cursor: pointer;
            margin-top: 12px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 24px 32px;
        }

        .mobile-header {
            display: none;
            justify-content: space-between;
            padding: 16px;
            background: #0F1420;
            margin-bottom: 20px;
        }

        .mobile-menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #8B93A5;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
        }

        .positive { color: #00D897; }
        .negative { color: #FF4757; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 10px 24px;
            background: transparent;
            border: none;
            color: #8B93A5;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-btn.active {
            color: #00D897;
            border-bottom: 2px solid #00D897;
        }

        /* Table */
        .trades-table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow-x: auto;
        }

        .trades-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .trades-table th, .trades-table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .trades-table th {
            color: #8B93A5;
            font-weight: 500;
        }

        .trade-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .trade-type-buy {
            background: rgba(0, 216, 151, 0.2);
            color: #00D897;
        }

        .trade-type-sell {
            background: rgba(255, 71, 87, 0.2);
            color: #FF4757;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .status-open {
            background: rgba(255, 165, 2, 0.2);
            color: #FFA502;
        }

        .status-closed {
            background: rgba(0, 216, 151, 0.2);
            color: #00D897;
        }

        .close-trade-btn {
            padding: 6px 16px;
            background: #FF4757;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8B93A5;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 1000;
            }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; }
            .mobile-header { display: flex; }
            .stats-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo">
                    <span class="logo-icon">📈</span>
                    <span class="logo-text">PocketTrading</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="home.html" class="nav-item">🏠 Home</a>
                <a href="markets.html" class="nav-item">📊 Markets</a>
                <a href="trades.html" class="nav-item active">🔄 Trades</a>
                <a href="profile.html" class="nav-item">👤 Profile</a>
            </nav>
            <div class="user-info-sidebar">
                <div class="user-avatar" id="sidebarAvatar">👤</div>
                <div class="user-name" id="sidebarUserName">Trader</div>
                <div class="user-email" id="sidebarUserEmail" style="font-size: 12px; color: #8B93A5;"></div>
                <button onclick="handleLogout()" class="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="mobile-header">
                <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('show')">☰</button>
                <div class="mobile-logo">PocketTrading</div>
                <div></div>
            </div>

            <div class="page-header">
                <h1>My Trades</h1>
                <p>Track and manage all your trading activity</p>
            </div>

            <div class="stats-cards">
                <div class="stat-card">
                    <div>💰 Total Invested</div>
                    <div class="stat-card-value" id="totalInvested">$0.00</div>
                </div>
                <div class="stat-card">
                    <div>📈 Total P&L</div>
                    <div class="stat-card-value" id="totalPnL">$0.00</div>
                </div>
                <div class="stat-card">
                    <div>🏆 Win Rate</div>
                    <div class="stat-card-value" id="winRate">0%</div>
                </div>
                <div class="stat-card">
                    <div>🔄 Total Trades</div>
                    <div class="stat-card-value" id="totalTradesCount">0</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('open')">Open Positions</button>
                <button class="tab-btn" onclick="showTab('closed')">Closed Positions</button>
                <button class="tab-btn" onclick="showTab('all')">All Trades</button>
            </div>

            <div class="trades-table-container">
                <table class="trades-table">
                    <thead>
                        <tr>
                            <th>Market</th>
                            <th>Type</th>
                            <th>Entry Price</th>
                            <th>Current/Exit</th>
                            <th>Amount</th>
                            <th>Leverage</th>
                            <th>P&L</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tradesList">
                        <tr><td colspan="9"><div class="empty-state">Loading trades...</div></td><tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Global variables
        let currentUser = null;
        let allTrades = [];
        let currentTab = 'open';

        // Initialize page
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is logged in via localStorage/sessionStorage
            const storedUser = sessionStorage.getItem('pocket_user') || localStorage.getItem('pocket_user');
            
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                updateUserUI();
                await loadUserTrades();
                renderTrades();
                updateStats();
            } else {
                // Redirect to login if not logged in
                window.location.href = 'login.html';
            }
        });

        // Update UI with user info
        function updateUserUI() {
            if (currentUser) {
                document.getElementById('sidebarUserName').textContent = currentUser.name || 'Trader';
                document.getElementById('sidebarUserEmail').textContent = currentUser.email || '';
            }
        }

        // Load user trades from localStorage
        async function loadUserTrades() {
            if (!currentUser) return;
            
            const savedTrades = localStorage.getItem(`trades_${currentUser.id}`);
            
            if (savedTrades && JSON.parse(savedTrades).length > 0) {
                allTrades = JSON.parse(savedTrades);
            } else {
                // Create demo trades
                allTrades = createDemoTrades();
                saveTrades();
            }
        }

        // Create demo trades for testing
        function createDemoTrades() {
            const now = new Date();
            return [
                {
                    id: 1001,
                    symbol: 'BTC/USD',
                    type: 'buy',
                    entry_price: 68432.50,
                    current_price: 69123.75,
                    amount: 1000,
                    leverage: 5,
                    pnl: 101.20,
                    status: 'open',
                    created_at: new Date(now.getTime() - 2 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: 1002,
                    symbol: 'ETH/USD',
                    type: 'sell',
                    entry_price: 3821.75,
                    current_price: 3756.30,
                    amount: 500,
                    leverage: 3,
                    pnl: 85.70,
                    status: 'open',
                    created_at: new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: 1003,
                    symbol: 'SOL/USD',
                    type: 'buy',
                    entry_price: 168.42,
                    current_price: 172.15,
                    amount: 800,
                    leverage: 10,
                    pnl: 176.50,
                    status: 'open',
                    created_at: new Date(now.getTime() - 1 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: 1004,
                    symbol: 'BTC/USD',
                    type: 'buy',
                    entry_price: 67500.00,
                    close_price: 69000.00,
                    amount: 2000,
                    leverage: 2,
                    pnl: 450.00,
                    status: 'closed',
                    created_at: new Date(now.getTime() - 10 * 24 * 60 * 60 * 1000).toISOString(),
                    closed_at: new Date(now.getTime() - 8 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: 1005,
                    symbol: 'DOGE/USD',
                    type: 'buy',
                    entry_price: 0.162,
                    close_price: 0.175,
                    amount: 200,
                    leverage: 20,
                    pnl: 320.99,
                    status: 'closed',
                    created_at: new Date(now.getTime() - 5 * 24 * 60 * 60 * 1000).toISOString(),
                    closed_at: new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000).toISOString()
                }
            ];
        }

        // Save trades to localStorage
        function saveTrades() {
            if (currentUser) {
                localStorage.setItem(`trades_${currentUser.id}`, JSON.stringify(allTrades));
            }
        }

        // Update statistics
        function updateStats() {
            const totalInvested = allTrades.reduce((sum, t) => sum + t.amount, 0);
            const totalPnL = allTrades.reduce((sum, t) => sum + (t.pnl || 0), 0);
            const closedTrades = allTrades.filter(t => t.status === 'closed');
            const winningTrades = closedTrades.filter(t => (t.pnl || 0) > 0).length;
            const winRate = closedTrades.length > 0 ? (winningTrades / closedTrades.length * 100).toFixed(1) : 0;
            
            document.getElementById('totalInvested').innerHTML = `$${totalInvested.toLocaleString()}`;
            document.getElementById('totalPnL').innerHTML = `<span style="color: ${totalPnL >= 0 ? '#00D897' : '#FF4757'}">${totalPnL >= 0 ? '+' : ''}$${Math.abs(totalPnL).toLocaleString()}</span>`;
            document.getElementById('winRate').textContent = `${winRate}%`;
            document.getElementById('totalTradesCount').textContent = allTrades.length;
        }

        // Format price
        function formatPrice(price) {
            if (!price) return '0.00';
            if (price < 1) return price.toFixed(4);
            return price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Render trades based on current tab
        function renderTrades() {
            let filteredTrades = [...allTrades];
            
            if (currentTab === 'open') {
                filteredTrades = filteredTrades.filter(t => t.status === 'open');
            } else if (currentTab === 'closed') {
                filteredTrades = filteredTrades.filter(t => t.status === 'closed');
            }
            
            const tbody = document.getElementById('tradesList');
            
            if (filteredTrades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state">No trades found. Start trading from the Markets page!</div></td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredTrades.map(trade => {
                const isOpen = trade.status === 'open';
                const currentPrice = isOpen ? trade.current_price : trade.close_price;
                const pnl = trade.pnl || 0;
                const pnlClass = pnl >= 0 ? 'positive' : 'negative';
                const pnlSymbol = pnl >= 0 ? '+' : '';
                const priceValue = currentPrice || trade.entry_price;
                
                return `
                    <tr>
                        <td><strong>${trade.symbol}</strong></td>
                        <td>
                            <span class="trade-type-badge ${trade.type === 'buy' ? 'trade-type-buy' : 'trade-type-sell'}">
                                ${trade.type === 'buy' ? 'BUY/LONG' : 'SELL/SHORT'}
                            </span>
                        </td>
                        <td>$${formatPrice(trade.entry_price)}</td>
                        <td>$${formatPrice(priceValue)}</td>
                        <td>$${trade.amount.toLocaleString()}</td>
                        <td>${trade.leverage}x</td>
                        <td class="${pnlClass}">${pnlSymbol}$${Math.abs(pnl).toLocaleString()}</td>
                        <td>
                            <span class="status-badge status-${trade.status}">
                                ${trade.status === 'open' ? 'Open' : 'Closed'}
                            </span>
                        </td>
                        <td>
                            ${isOpen ? `<button class="close-trade-btn" onclick="closeTrade(${trade.id})">Close</button>` : '-'}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Close a trade
        function closeTrade(tradeId) {
            const trade = allTrades.find(t => t.id === tradeId);
            if (!trade || trade.status !== 'open') return;
            
            if (confirm(`Are you sure you want to close your ${trade.symbol} position?`)) {
                // Update trade status
                trade.status = 'closed';
                trade.close_price = trade.current_price;
                trade.closed_at = new Date().toISOString();
                
                // Update user balance with P&L (if auth is available)
                if (typeof auth !== 'undefined' && auth.updateBalance) {
                    auth.updateBalance(currentUser.id, trade.pnl, {
                        type: 'trade_close',
                        trade_id: tradeId,
                        symbol: trade.symbol,
                        pnl: trade.pnl
                    });
                } else {
                    // Manual balance update
                    const newBalance = (currentUser.balance || 0) + trade.pnl;
                    currentUser.balance = newBalance;
                    
                    // Update storage
                    if (localStorage.getItem('pocket_user')) {
                        const user = JSON.parse(localStorage.getItem('pocket_user'));
                        user.balance = newBalance;
                        localStorage.setItem('pocket_user', JSON.stringify(user));
                    }
                    if (sessionStorage.getItem('pocket_user')) {
                        const user = JSON.parse(sessionStorage.getItem('pocket_user'));
                        user.balance = newBalance;
                        sessionStorage.setItem('pocket_user', JSON.stringify(user));
                    }
                }
                
                saveTrades();
                updateStats();
                renderTrades();
                
                alert(`Position closed! ${trade.pnl >= 0 ? 'Profit' : 'Loss'}: $${Math.abs(trade.pnl).toLocaleString()}`);
            }
        }

        // Show tab
        function showTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach((btn, index) => {
                btn.classList.remove('active');
            });
            
            if (tab === 'open') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else if (tab === 'closed') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
            }
            
            renderTrades();
        }

        // Handle logout
        function handleLogout() {
            localStorage.removeItem('pocket_user');
            sessionStorage.removeItem('pocket_user');
            window.location.href = 'home.html';
        }

        // Make functions global for onclick handlers
        window.closeTrade = closeTrade;
        window.showTab = showTab;
        window.handleLogout = handleLogout;
    </script>
</body>
</html>
