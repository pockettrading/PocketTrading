<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Advanced Trading View</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --bid-color: #00D897;
            --ask-color: #FF4757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* User Dropdown */
        .user-dropdown {
            position: relative;
            cursor: pointer;
        }

        .user-name-display {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--card-bg);
            border-radius: 40px;
            transition: all 0.3s;
        }

        .user-name-display:hover {
            background: var(--card-hover);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 160px;
            display: none;
            z-index: 100;
            margin-top: 0.5rem;
            box-shadow: var(--shadow);
        }

        .user-dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            padding: 10px 16px;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            transition: all 0.3s;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .dropdown-item:hover {
            background: var(--card-hover);
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 0.5rem 0;
        }

        /* Main Trading Grid */
        .trading-grid {
            display: grid;
            grid-template-columns: 1fr 320px 1fr;
            gap: 1rem;
        }

        /* Chart Section */
        .chart-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .symbol-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .price-change {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .price-change.positive {
            background: rgba(0, 216, 151, 0.1);
            color: var(--success);
        }

        .price-change.negative {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
        }

        .timeframe-selector {
            display: flex;
            gap: 0.25rem;
            background: var(--darker-bg);
            padding: 0.25rem;
            border-radius: 12px;
        }

        .timeframe-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .timeframe-btn:hover {
            color: var(--primary);
        }

        .timeframe-btn.active {
            background: var(--primary);
            color: white;
        }

        #chart {
            width: 100%;
            height: 400px;
        }

        /* Market Stats Row */
        .market-stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Order Book Section */
        .orderbook-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .orderbook-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            text-align: right;
        }

        .orderbook-header span:first-child {
            text-align: left;
        }

        .orderbook-asks {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
        }

        .orderbook-bids {
            max-height: 200px;
            overflow-y: auto;
        }

        .orderbook-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
        }

        .orderbook-row span:first-child {
            text-align: left;
        }

        .orderbook-row:hover {
            background: var(--card-hover);
        }

        .orderbook-bid {
            color: var(--bid-color);
        }

        .orderbook-ask {
            color: var(--ask-color);
        }

        .orderbook-spread {
            text-align: center;
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: var(--darker-bg);
            border-radius: 8px;
            font-size: 0.75rem;
        }

        /* Trading Panel Section */
        .trading-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
        }

        .trade-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .trade-tab {
            flex: 1;
            padding: 8px;
            background: var(--darker-bg);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .trade-tab.buy.active {
            background: rgba(0, 216, 151, 0.2);
            color: var(--success);
        }

        .trade-tab.sell.active {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .amount-input {
            width: 100%;
            padding: 10px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .quick-amounts {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .quick-amount {
            flex: 1;
            padding: 4px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
        }

        .quick-amount:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .order-summary {
            background: var(--darker-bg);
            padding: 0.75rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .summary-row.total {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            font-weight: 700;
        }

        .trade-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .trade-btn.buy {
            background: linear-gradient(135deg, var(--success), #00b894);
            color: white;
        }

        .trade-btn.sell {
            background: linear-gradient(135deg, var(--danger), #ff6b6b);
            color: white;
        }

        .trade-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-tertiary);
        }

        @media (max-width: 1200px) {
            .trading-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .top-nav {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
            
            .market-stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trade.html" class="nav-link">Trades</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </div>
            <div id="userSection"></div>
        </div>

        <!-- Trading Grid -->
        <div class="trading-grid">
            <!-- Left: Chart Section -->
            <div class="chart-section">
                <div class="chart-header">
                    <div class="symbol-info">
                        <span class="symbol-name" id="symbolName">BTC/USDT</span>
                        <span class="current-price" id="currentPrice">$0.00</span>
                        <span class="price-change" id="priceChange">0.00%</span>
                    </div>
                    <div class="timeframe-selector">
                        <button class="timeframe-btn" data-interval="1m">1m</button>
                        <button class="timeframe-btn" data-interval="5m">5m</button>
                        <button class="timeframe-btn" data-interval="15m">15m</button>
                        <button class="timeframe-btn active" data-interval="1h">1h</button>
                        <button class="timeframe-btn" data-interval="4h">4h</button>
                        <button class="timeframe-btn" data-interval="1d">1d</button>
                        <button class="timeframe-btn" data-interval="1w">1w</button>
                    </div>
                </div>
                <div id="chart"></div>
                
                <!-- Market Stats -->
                <div class="market-stats-row">
                    <div class="stat-item">
                        <div class="stat-label">24h High</div>
                        <div class="stat-value" id="high24h">$0.00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">24h Low</div>
                        <div class="stat-value" id="low24h">$0.00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">24h Volume</div>
                        <div class="stat-value" id="volume24h">$0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Market Cap</div>
                        <div class="stat-value" id="marketCap">$0</div>
                    </div>
                </div>
            </div>

            <!-- Center: Order Book -->
            <div class="orderbook-section">
                <div class="section-title">ORDER BOOK</div>
                <div class="orderbook-header">
                    <span>Price (USDT)</span>
                    <span>Amount</span>
                    <span>Total</span>
                </div>
                <div class="orderbook-asks" id="asksContainer">
                    <div class="loading">Loading asks...</div>
                </div>
                <div class="orderbook-spread" id="orderbookSpread">
                    Spread: $0.00 (0.00%)
                </div>
                <div class="orderbook-bids" id="bidsContainer">
                    <div class="loading">Loading bids...</div>
                </div>
            </div>

            <!-- Right: Trading Panel -->
            <div class="trading-panel">
                <div class="trade-tabs">
                    <button class="trade-tab buy active" data-trade="buy">BUY</button>
                    <button class="trade-tab sell" data-trade="sell">SELL</button>
                </div>
                
                <div class="input-group">
                    <label>Amount (USDT)</label>
                    <input type="number" id="tradeAmount" class="amount-input" placeholder="0.00" value="0">
                    <div class="quick-amounts">
                        <button class="quick-amount" data-percent="25">25%</button>
                        <button class="quick-amount" data-percent="50">50%</button>
                        <button class="quick-amount" data-percent="75">75%</button>
                        <button class="quick-amount" data-percent="100">100%</button>
                    </div>
                </div>
                
                <div class="order-summary">
                    <div class="summary-row">
                        <span>Price (USDT)</span>
                        <strong id="orderPrice">$0.00</strong>
                    </div>
                    <div class="summary-row">
                        <span>Amount</span>
                        <strong id="orderAmount">0.0000 BTC</strong>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <strong id="orderTotal">$0.00</strong>
                    </div>
                </div>
                
                <button class="trade-btn buy" id="executeTradeBtn">BUY BTC</button>
            </div>
        </div>
    </div>

    <script src="js/trading-view.js"></script>
</body>
</html>
