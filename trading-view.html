<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TradingView - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- TradingView Widget -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0F1A; color: #FFFFFF; overflow-x: hidden; }
        
        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { font-size: 24px; }
        .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #00D897, #00B8A0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link { padding: 6px 16px; border-radius: 40px; color: #8B93A5; text-decoration: none; font-size: 14px; }
        .nav-link:hover, .nav-link.active { background: rgba(0, 216, 151, 0.1); color: #00D897; }
        .user-section { display: flex; align-items: center; gap: 12px; }
        .logout-btn { padding: 6px 16px; background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); border-radius: 40px; color: #FF4757; cursor: pointer; font-size: 13px; }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; color: white; cursor: pointer; }
        
        /* Main Layout */
        .main-content { margin-top: 60px; padding: 16px; max-width: 1600px; margin-left: auto; margin-right: auto; }
        .trading-layout { display: flex; gap: 16px; flex-wrap: wrap; }
        .chart-section { flex: 2; min-width: 300px; }
        .info-section { flex: 1; min-width: 280px; }
        
        /* Market Header */
        .market-header { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .market-title { font-size: 24px; font-weight: 700; }
        .market-price { font-size: 28px; font-weight: 800; }
        .market-change { font-size: 16px; margin-left: 12px; }
        
        /* Timeframes */
        .timeframes { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .time-btn { padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: #8B93A5; cursor: pointer; font-size: 12px; }
        .time-btn.active { background: #00D897; color: white; border-color: transparent; }
        
        /* Chart Container */
        .chart-container { background: #131722; border-radius: 16px; overflow: hidden; height: 500px; margin-bottom: 16px; }
        #tv_chart_container { width: 100%; height: 100%; }
        
        /* Order Book */
        .order-book { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .section-title { font-size: 14px; color: #8B93A5; margin-bottom: 12px; font-weight: 600; }
        .order-book-table { width: 100%; font-size: 12px; }
        .order-book-table td { padding: 4px 0; }
        .order-book-table .ask { color: #FF4757; }
        .order-book-table .bid { color: #00D897; }
        .order-book-table .price { font-weight: 600; }
        .order-book-table .total { text-align: right; }
        
        /* Trading Panel */
        .trading-panel { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .trade-type-buttons { display: flex; gap: 12px; margin-bottom: 16px; }
        .trade-btn { flex: 1; padding: 10px; border: none; border-radius: 40px; font-weight: 700; cursor: pointer; }
        .trade-btn.buy { background: #00D897; color: white; }
        .trade-btn.buy.active { background: #00B887; box-shadow: 0 0 10px rgba(0,216,151,0.5); }
        .trade-btn.sell { background: #FF4757; color: white; }
        .trade-btn.sell.active { background: #E03545; box-shadow: 0 0 10px rgba(255,71,87,0.5); }
        .amount-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 16px; margin: 12px 0; }
        .percent-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
        .percent-btn { flex: 1; padding: 8px; background: rgba(255,255,255,0.05); border: none; border-radius: 8px; color: #8B93A5; cursor: pointer; }
        .trade-summary { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin: 12px 0; font-size: 13px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .confirm-trade { width: 100%; padding: 12px; background: linear-gradient(135deg, #00D897, #00B8A0); border: none; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; }
        .confirm-trade:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Price Alerts & Addresses */
        .alerts-section, .addresses-section { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .add-btn { padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; color: #00D897; cursor: pointer; text-align: center; font-size: 12px; }
        
        @media (max-width: 900px) {
            .trading-layout { flex-direction: column; }
            .chart-container { height: 350px; }
            .market-price { font-size: 20px; }
        }
        @media (max-width: 600px) {
            .nav-links, .user-section { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="home.html" class="logo"><span class="logo-icon">📈</span><span class="logo-text">PocketTrading</span></a>
            <div class="nav-links"><a href="home.html" class="nav-link">Home</a><a href="markets.html" class="nav-link">Markets</a><a href="trades.html" class="nav-link">Trades</a><a href="profile.html" class="nav-link">My Profile</a></div>
            <div class="user-section" id="userSection"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="market-header" id="marketHeader">
            <div><span class="market-title" id="marketTitle">BTC/USD</span><span class="market-change" id="marketChange">+2.34%</span></div>
            <div><span class="market-price" id="marketPrice">$78,312.00</span></div>
        </div>

        <div class="trading-layout">
            <div class="chart-section">
                <div class="timeframes" id="timeframes">
                    <button class="time-btn active" data-interval="1">1m</button>
                    <button class="time-btn" data-interval="5">5m</button>
                    <button class="time-btn" data-interval="15">15m</button>
                    <button class="time-btn" data-interval="60">1h</button>
                    <button class="time-btn" data-interval="240">4h</button>
                    <button class="time-btn" data-interval="1D">1d</button>
                    <button class="time-btn" data-interval="1W">1w</button>
                </div>
                <div class="chart-container"><div id="tv_chart_container"></div></div>
            </div>

            <div class="info-section">
                <!-- Order Book -->
                <div class="order-book">
                    <div class="section-title">ORDER BOOK</div>
                    <table class="order-book-table" id="orderBookTable">
                        <tbody id="orderBookBody"></tbody>
                    </table>
                </div>

                <!-- Trading Panel (Only for logged-in users) -->
                <div class="trading-panel" id="tradingPanel" style="display: none;">
                    <div class="section-title">Place Trade</div>
                    <div class="trade-type-buttons">
                        <button class="trade-btn buy active" data-type="buy">BUY</button>
                        <button class="trade-btn sell" data-type="sell">SELL</button>
                    </div>
                    <input type="number" id="tradeAmount" class="amount-input" placeholder="Amount (USDT)" min="10" step="10">
                    <div class="percent-buttons">
                        <button class="percent-btn" data-percent="25">25%</button>
                        <button class="percent-btn" data-percent="50">50%</button>
                        <button class="percent-btn" data-percent="75">75%</button>
                        <button class="percent-btn" data-percent="100">100%</button>
                    </div>
                    <div class="trade-summary" id="tradeSummary">
                        <div class="summary-row"><span>Available:</span><span id="availableBalance">0.00 USDT</span></div>
                        <div class="summary-row"><span>Fee (2%):</span><span id="feeAmount">0.00 USDT</span></div>
                        <div class="summary-row"><span>Total:</span><span id="totalAmount">0.00 USDT</span></div>
                    </div>
                    <button class="confirm-trade" id="confirmTrade">Confirm Trade</button>
                </div>

                <!-- Guest Message -->
                <div class="trading-panel" id="guestPanel" style="display: none;">
                    <div class="section-title">Login to Trade</div>
                    <p style="color: #8B93A5; font-size: 13px; margin-bottom: 16px;">Please login or register to start trading.</p>
                    <a href="login.html" class="confirm-trade" style="display: block; text-align: center; text-decoration: none;">Login / Register</a>
                </div>

                <!-- Price Alerts -->
                <div class="alerts-section">
                    <div class="section-title">Price Alerts <button class="add-btn" style="float: right; padding: 4px 12px;" onclick="addAlert()">+Add</button></div>
                    <div id="alertsList"><div style="color: #5A6475; font-size: 12px;">No alerts</div></div>
                </div>

                <!-- Saved Addresses -->
                <div class="addresses-section">
                    <div class="section-title">Saved Addresses <button class="add-btn" style="float: right; padding: 4px 12px;" onclick="addAddress()">+Add</button></div>
                    <div id="addressesList"><div style="color: #5A6475; font-size: 12px;">No addresses</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let currentSymbol = 'BTC';
        let currentPrice = 78312.00;
        let currentChange = 2.34;
        let currentTradeType = 'buy';
        let tvWidget = null;

        const symbols = { BTC: { name: 'BTC/USD', pair: 'BINANCE:BTCUSDT' }, ETH: { name: 'ETH/USD', pair: 'BINANCE:ETHUSDT' }, SOL: { name: 'SOL/USD', pair: 'BINANCE:SOLUSDT' }, XRP: { name: 'XRP/USD', pair: 'BINANCE:XRPUSDT' }, DOGE: { name: 'DOGE/USD', pair: 'BINANCE:DOGEUSDT' } };

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const symbolParam = urlParams.get('symbol');
            if (symbolParam && symbols[symbolParam.toUpperCase()]) currentSymbol = symbolParam.toUpperCase();
            
            await waitForAuth();
            if (typeof auth !== 'undefined') currentUser = auth.getUser();
            setupNavigation();
            initTradingView();
            loadUserBalance();
            setupEventListeners();
            updateOrderBook();
            setInterval(updateOrderBook, 5000);
        });

        function waitForAuth() { return new Promise(r => { if (typeof auth !== 'undefined') r(); else setTimeout(() => r(), 100); }); }

        function setupNavigation() {
            const userSection = document.getElementById('userSection');
            const tradingPanel = document.getElementById('tradingPanel');
            const guestPanel = document.getElementById('guestPanel');
            if (currentUser) {
                userSection.innerHTML = `<div class="user-info"><div class="user-name">${currentUser.name || currentUser.email.split('@')[0]}</div></div><button class="logout-btn" onclick="handleLogout()">Logout</button>`;
                tradingPanel.style.display = 'block';
                guestPanel.style.display = 'none';
            } else {
                userSection.innerHTML = `<a href="login.html" style="color:#00D897; text-decoration:none;">Login</a>`;
                tradingPanel.style.display = 'none';
                guestPanel.style.display = 'block';
            }
            document.getElementById('marketTitle').textContent = symbols[currentSymbol]?.name || `${currentSymbol}/USD`;
            updateMarketData();
        }

        async function loadUserBalance() {
            if (currentUser) document.getElementById('availableBalance').textContent = `${(currentUser.balance || 0).toFixed(2)} USDT`;
        }

        function updateMarketData() {
            // Simulate price updates
            setInterval(() => {
                const change = (Math.random() - 0.5) * 50;
                currentPrice = Math.max(0.01, currentPrice + change);
                currentChange = currentChange + (Math.random() - 0.5) * 0.5;
                document.getElementById('marketPrice').textContent = `$${currentPrice.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                document.getElementById('marketChange').textContent = `${currentChange >= 0 ? '+' : ''}${currentChange.toFixed(2)}%`;
                document.getElementById('marketChange').style.color = currentChange >= 0 ? '#00D897' : '#FF4757';
            }, 3000);
        }

        function initTradingView() {
            const pair = symbols[currentSymbol]?.pair || 'BINANCE:BTCUSDT';
            if (tvWidget) tvWidget.remove();
            new TradingView.widget({
                container_id: "tv_chart_container",
                width: "100%",
                height: "100%",
                symbol: pair,
                interval: "1",
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                toolbar_bg: "#131722",
                enable_publishing: false,
                hide_side_toolbar: false,
                allow_symbol_change: false,
                studies: ["RSI@tv-basicstudies", "MACD@tv-basicstudies", "Volume@tv-basicstudies"],
                save_image: false,
                autosize: true
            });
        }

        function updateOrderBook() {
            const basePrice = currentPrice;
            const bids = [];
            const asks = [];
            for (let i = 1; i <= 10; i++) {
                bids.push({ price: basePrice - i * (basePrice * 0.0005), amount: (Math.random() * 2).toFixed(4), total: (Math.random() * 100).toFixed(2) });
                asks.push({ price: basePrice + i * (basePrice * 0.0005), amount: (Math.random() * 2).toFixed(4), total: (Math.random() * 100).toFixed(2) });
            }
            const orderBookBody = document.getElementById('orderBookBody');
            orderBookBody.innerHTML = `<tr style="color:#FF4757;"><td class="price">Price(USDT)</td><td>Amount</td><td class="total">Total</td></tr>`;
            asks.slice().reverse().forEach(a => { orderBookBody.innerHTML += `<tr class="ask"><td class="price">${a.price.toFixed(2)}</td><td>${a.amount}</td><td class="total">${a.total}</td></tr>`; });
            orderBookBody.innerHTML += `<tr><td colspan="3" style="text-align:center; padding:8px;">Spread: ${(asks[0]?.price - bids[0]?.price).toFixed(2)} (${((asks[0]?.price - bids[0]?.price) / basePrice * 100).toFixed(2)}%)</td></tr>`;
            bids.forEach(b => { orderBookBody.innerHTML += `<tr class="bid"><td class="price">${b.price.toFixed(2)}</td><td>${b.amount}</td><td class="total">${b.total}</td></tr>`; });
        }

        function setupEventListeners() {
            document.querySelectorAll('.trade-btn').forEach(btn => btn.addEventListener('click', () => {
                document.querySelectorAll('.trade-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTradeType = btn.dataset.type;
                updateTradeSummary();
            }));
            document.querySelectorAll('.percent-btn').forEach(btn => btn.addEventListener('click', () => {
                const percent = parseInt(btn.dataset.percent) / 100;
                const balance = currentUser?.balance || 0;
                document.getElementById('tradeAmount').value = (balance * percent).toFixed(2);
                updateTradeSummary();
            }));
            document.getElementById('tradeAmount').addEventListener('input', () => updateTradeSummary());
            document.getElementById('confirmTrade').addEventListener('click', executeTrade);
            document.querySelectorAll('.time-btn').forEach(btn => btn.addEventListener('click', () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (tvWidget) tvWidget.setInterval(btn.dataset.interval);
            }));
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {});
        }

        function updateTradeSummary() {
            const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;
            const fee = amount * 0.02;
            const total = amount + fee;
            document.getElementById('feeAmount').textContent = `${fee.toFixed(2)} USDT`;
            document.getElementById('totalAmount').textContent = `${total.toFixed(2)} USDT`;
            const balance = currentUser?.balance || 0;
            document.getElementById('confirmTrade').disabled = total > balance || amount < 10;
        }

        async function executeTrade() {
            if (!currentUser) { window.location.href = 'login.html'; return; }
            const amount = parseFloat(document.getElementById('tradeAmount').value);
            if (amount < 10) { alert('Minimum trade amount is $10'); return; }
            const fee = amount * 0.02;
            const total = amount + fee;
            if (total > (currentUser.balance || 0)) { alert('Insufficient balance'); return; }
            
            const newBalance = (currentUser.balance || 0) - total;
            currentUser.balance = newBalance;
            if (auth?.updateBalance) await auth.updateBalance(currentUser.id, -total, { type: 'trade', symbol: currentSymbol, amount: amount, trade_type: currentTradeType });
            
            const trade = { id: Date.now(), user_id: currentUser.id, symbol: currentSymbol, type: currentTradeType, amount: amount, entry_price: currentPrice, fee: fee, status: 'open', created_at: new Date().toISOString() };
            const trades = JSON.parse(localStorage.getItem(`trades_${currentUser.id}`) || '[]');
            trades.push(trade);
            localStorage.setItem(`trades_${currentUser.id}`, JSON.stringify(trades));
            
            alert(`Trade executed! ${currentTradeType.toUpperCase()} $${amount} ${currentSymbol}/USD`);
            document.getElementById('tradeAmount').value = '';
            updateTradeSummary();
            loadUserBalance();
            
            setTimeout(() => {
                const isWin = Math.random() < 0.55;
                const winAmount = amount * (isWin ? 1.8 : 0);
                if (isWin) {
                    const winBalance = currentUser.balance + winAmount;
                    if (auth?.updateBalance) auth.updateBalance(currentUser.id, winAmount, { type: 'trade_win' });
                    alert(`🎉 WIN! You won $${winAmount.toFixed(2)} on ${currentSymbol}!`);
                } else alert(`😢 LOSS! You lost $${amount.toFixed(2)} on ${currentSymbol}`);
                loadUserBalance();
            }, 60000);
        }

        function addAlert() { alert('Price alert feature - set notification when price reaches target'); }
        function addAddress() { alert('Save wallet address for quick withdrawals'); }
        window.handleLogout = () => { if (auth?.logout) auth.logout(); else { localStorage.clear(); sessionStorage.clear(); window.location.href = 'home.html'; } };
        window.addAlert = addAlert;
        window.addAddress = addAddress;
    </script>
</body>
</html>
