<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Withdraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* User Info in Top Right */
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .username {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .logout-link {
            color: var(--danger);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-link:hover {
            text-decoration: underline;
        }

        /* Auth Buttons */
        .auth-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .login-btn {
            background: transparent;
            color: var(--primary);
            padding: 8px 20px;
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .login-btn:hover {
            background: rgba(247, 147, 26, 0.1);
            transform: translateY(-2px);
        }

        .signup-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        /* Admin Badge */
        .admin-badge {
            background: linear-gradient(135deg, var(--danger), #ff6b6b);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 20px;
            max-width: 500px;
            margin: 2rem auto;
        }

        .login-prompt h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .login-prompt p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Withdraw Container */
        .withdraw-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .withdraw-header {
            margin-bottom: 2rem;
        }

        .withdraw-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .withdraw-header p {
            color: var(--text-secondary);
        }

        /* Withdraw Card */
        .withdraw-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .balance-info {
            background: var(--darker-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .balance-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .balance-amount {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .quick-amounts {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .quick-amount {
            flex: 1;
            padding: 8px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.75rem;
            text-align: center;
        }

        .quick-amount:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .limit-info {
            background: var(--darker-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .limit-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .limit-label {
            color: var(--text-secondary);
        }

        .limit-value {
            font-weight: 600;
        }

        .warning-message {
            background: rgba(255, 71, 87, 0.1);
            border-left: 3px solid var(--danger);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .warning-message p {
            color: var(--danger);
            font-size: 0.8rem;
            margin: 0;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-note {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 165, 2, 0.1);
            border-radius: 12px;
            text-align: center;
        }

        .info-note p {
            color: var(--warning);
            font-size: 0.8rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .top-nav {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
            
            .user-info {
                justify-content: center;
            }
            
            .balance-info {
                flex-direction: column;
                text-align: center;
            }
            
            .quick-amounts {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trade.html" class="nav-link">Trades</a>
            </div>
            <div class="user-info" id="userInfo"></div>
        </div>

        <div id="withdrawContent">
            <!-- Content will be populated by JavaScript based on login status -->
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/withdraw.js"></script>
</body>
</html>
