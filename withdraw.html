<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Withdraw Funds - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
        }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content - Wider Form */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }

        .withdraw-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }
        .card-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .card-header p {
            color: #8B93A5;
            font-size: 14px;
        }

        .card-body {
            padding: 24px;
        }

        /* Balance Display */
        .balance-display {
            background: rgba(0, 216, 151, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(0, 216, 151, 0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
        }
        .balance-value {
            font-size: 32px;
            font-weight: 800;
            color: #00D897;
        }

        /* Currency Selector */
        .currency-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .currency-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 600;
        }
        .currency-btn.active {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-color: transparent;
        }
        .currency-btn:hover {
            border-color: #00D897;
        }

        /* Amount Input */
        .amount-section {
            margin-bottom: 24px;
        }
        .amount-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
            display: block;
        }
        .amount-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        .amount-input:focus {
            outline: none;
            border-color: #00D897;
        }
        .preset-amounts {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .preset-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #00D897;
            color: #00D897;
        }

        /* Wallet Address Input */
        .wallet-section {
            margin-bottom: 24px;
        }
        .wallet-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
            display: block;
        }
        .wallet-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        .wallet-input:focus {
            outline: none;
            border-color: #00D897;
        }

        /* Summary Row */
        .summary {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .summary-item {
            flex: 1;
            text-align: center;
        }
        .summary-label {
            font-size: 12px;
            color: #8B93A5;
            margin-bottom: 4px;
        }
        .summary-value {
            font-size: 18px;
            font-weight: 700;
        }
        .summary-value.total {
            color: #FF4757;
            font-size: 20px;
        }
        .summary-value.receive {
            color: #00D897;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF4757, #FF6B6B);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-text {
            text-align: center;
            font-size: 12px;
            color: #5A6475;
            margin-top: 20px;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            max-width: 350px;
        }
        .notification-success { background: rgba(0, 216, 151, 0.95); color: white; }
        .notification-error { background: rgba(255, 71, 87, 0.95); color: white; }
        .notification-info { background: rgba(255, 165, 2, 0.95); color: white; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links, .user-section { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .withdraw-card { max-width: 100%; }
            .summary { flex-direction: column; }
            .summary-item { text-align: left; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div id="rightNav"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="main-content">
        <div class="withdraw-card">
            <div class="card-header">
                <h1>Withdraw Funds</h1>
                <p>Withdraw your funds to your cryptocurrency wallet</p>
            </div>
            <div class="card-body">
                <div class="balance-display">
                    <div class="balance-label">Available Balance</div>
                    <div class="balance-value" id="currentBalance">$0.00</div>
                </div>

                <div class="currency-selector" id="currencySelector">
                    <button class="currency-btn active" data-currency="USDT">USDT</button>
                    <button class="currency-btn" data-currency="BTC">BTC</button>
                    <button class="currency-btn" data-currency="ETH">ETH</button>
                </div>

                <div class="amount-section">
                    <div class="amount-label">Withdrawal Amount</div>
                    <input type="number" id="withdrawAmount" class="amount-input" placeholder="Enter amount" min="10" step="10">
                    <div class="preset-amounts">
                        <button class="preset-btn" data-amount="50">$50</button>
                        <button class="preset-btn" data-amount="100">$100</button>
                        <button class="preset-btn" data-amount="500">$500</button>
                        <button class="preset-btn" data-amount="1000">$1,000</button>
                    </div>
                </div>

                <div class="wallet-section">
                    <div class="wallet-label">Wallet Address</div>
                    <input type="text" id="walletAddress" class="wallet-input" placeholder="Enter your cryptocurrency wallet address">
                </div>

                <div class="summary">
                    <div class="summary-item">
                        <div class="summary-label">Withdrawal Amount</div>
                        <div class="summary-value" id="summaryAmount">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Withdrawal Fee (<span id="feePercent">1.5</span>%)</div>
                        <div class="summary-value" id="feeAmount">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">You Will Receive</div>
                        <div class="summary-value receive" id="receiveAmount">$0.00</div>
                    </div>
                </div>

                <button class="submit-btn" id="submitWithdraw">Request Withdrawal</button>
                <div class="info-text">
                    ⏱️ Withdrawals are processed within 24-48 hours. Minimum withdrawal: $10
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts - Load in correct order -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/withdraw.js"></script>
    
    <script>
        // Show notification function
        function showNotification(message, type) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }
        
        // Global logout
        window.handleLogout = function() {
            if (typeof auth !== 'undefined' && auth.logout) {
                auth.logout();
            } else {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
