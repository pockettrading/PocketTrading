<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Withdraw Funds - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
        }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content - Wider Form */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }

        .withdraw-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }
        .card-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .card-header p {
            color: #8B93A5;
            font-size: 14px;
        }

        .card-body {
            padding: 24px;
        }

        .balance-display {
            background: rgba(0, 216, 151, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(0, 216, 151, 0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
        }
        .balance-value {
            font-size: 32px;
            font-weight: 800;
            color: #00D897;
        }

        .currency-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .currency-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 600;
        }
        .currency-btn.active {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-color: transparent;
        }

        .amount-section {
            margin-bottom: 24px;
        }
        .amount-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
            display: block;
        }
        .amount-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        .amount-input:focus {
            outline: none;
            border-color: #00D897;
        }
        .preset-amounts {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .preset-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #00D897;
            color: #00D897;
        }

        .wallet-section {
            margin-bottom: 24px;
        }
        .wallet-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
            display: block;
        }
        .wallet-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        .wallet-input:focus {
            outline: none;
            border-color: #00D897;
        }

        .summary {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .summary-item {
            flex: 1;
            text-align: center;
        }
        .summary-label {
            font-size: 12px;
            color: #8B93A5;
            margin-bottom: 4px;
        }
        .summary-value {
            font-size: 18px;
            font-weight: 700;
        }
        .summary-value.total {
            color: #FF4757;
            font-size: 20px;
        }
        .summary-value.receive {
            color: #00D897;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF4757, #FF6B6B);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-text {
            text-align: center;
            font-size: 12px;
            color: #5A6475;
            margin-top: 20px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            max-width: 350px;
        }
        .notification-success { background: rgba(0, 216, 151, 0.95); color: white; }
        .notification-error { background: rgba(255, 71, 87, 0.95); color: white; }
        .notification-info { background: rgba(255, 165, 2, 0.95); color: white; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .nav-links, .user-section { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .withdraw-card { max-width: 100%; }
            .summary { flex-direction: column; }
            .summary-item { text-align: left; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div id="rightNav"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="main-content">
        <div class="withdraw-card">
            <div class="card-header">
                <h1>Withdraw Funds</h1>
                <p>Withdraw your funds to your cryptocurrency wallet</p>
            </div>
            <div class="card-body">
                <div class="balance-display">
                    <div class="balance-label">Available Balance</div>
                    <div class="balance-value" id="currentBalance">$0.00</div>
                </div>

                <div class="currency-selector" id="currencySelector">
                    <button class="currency-btn active" data-currency="USDT">USDT</button>
                    <button class="currency-btn" data-currency="BTC">BTC</button>
                    <button class="currency-btn" data-currency="ETH">ETH</button>
                </div>

                <div class="amount-section">
                    <div class="amount-label">Withdrawal Amount</div>
                    <input type="number" id="withdrawAmount" class="amount-input" placeholder="Enter amount" min="10" step="10">
                    <div class="preset-amounts">
                        <button class="preset-btn" data-amount="50">$50</button>
                        <button class="preset-btn" data-amount="100">$100</button>
                        <button class="preset-btn" data-amount="500">$500</button>
                        <button class="preset-btn" data-amount="1000">$1,000</button>
                    </div>
                </div>

                <div class="wallet-section">
                    <div class="wallet-label">Wallet Address</div>
                    <input type="text" id="walletAddress" class="wallet-input" placeholder="Enter your cryptocurrency wallet address">
                </div>

                <div class="summary">
                    <div class="summary-item">
                        <div class="summary-label">Withdrawal Amount</div>
                        <div class="summary-value" id="summaryAmount">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Withdrawal Fee (<span id="feePercent">1.5</span>%)</div>
                        <div class="summary-value" id="feeAmount">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">You Will Receive</div>
                        <div class="summary-value receive" id="receiveAmount">$0.00</div>
                    </div>
                </div>

                <button class="submit-btn" id="submitWithdraw">Request Withdrawal</button>
                <div class="info-text">
                    ⏱️ Withdrawals are processed within 24-48 hours. Minimum withdrawal: $10
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        let currentUser = null;
        let selectedCurrency = 'USDT';
        let withdrawalFee = 1.5;
        let minWithdrawal = 10;

        // Update navbar based on user state
        function updateNavbar() {
            const navLinks = document.getElementById('navLinks');
            const rightNav = document.getElementById('rightNav');
            const mobileMenu = document.getElementById('mobileMenu');
            
            if (!navLinks) return;
            
            if (currentUser) {
                const isAdmin = currentUser.email === 'ephremgojo@gmail.com';
                const userName = currentUser.name || currentUser.email.split('@')[0];
                
                navLinks.innerHTML = `
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="markets.html" class="nav-link">Markets</a>
                    <a href="trades.html" class="nav-link">Trades</a>
                    <a href="profile.html" class="nav-link">My Profile</a>
                `;
                
                rightNav.innerHTML = `
                    <div class="user-section">
                        <div class="user-info">
                            <div class="user-avatar">${userName.charAt(0).toUpperCase()}</div>
                            <div class="user-name">${userName}${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>
                        </div>
                        ${isAdmin ? '<a href="admin.html" class="admin-link">⚙️ Admin Panel</a>' : ''}
                        <button class="logout-btn" onclick="logout()">Logout</button>
                    </div>
                `;
                
                mobileMenu.innerHTML = `
                    <a href="index.html" class="mobile-nav-link">🏠 Home</a>
                    <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
                    <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
                    <a href="profile.html" class="mobile-nav-link">👤 My Profile</a>
                    ${isAdmin ? '<a href="admin.html" class="mobile-nav-link">⚙️ Admin Panel</a>' : ''}
                    <button class="logout-btn" style="margin-top:12px;" onclick="logout()">Logout</button>
                `;
            } else {
                // Guest users should not be on withdraw page - redirect to login
                window.location.href = 'login.html';
            }
        }

        // Load settings from Supabase
        async function loadSettings() {
            try {
                const settings = await supabaseDB.getPlatformSettings();
                if (settings && settings.trading_settings) {
                    withdrawalFee = settings.trading_settings.withdrawalFee || 1.5;
                    minWithdrawal = settings.trading_settings.minTradeAmount || 10;
                }
                const feePercentEl = document.getElementById('feePercent');
                if (feePercentEl) feePercentEl.textContent = withdrawalFee;
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function updateBalanceDisplay() {
            const balance = currentUser.balance || 0;
            const balanceEl = document.getElementById('currentBalance');
            if (balanceEl) {
                balanceEl.textContent = `$${balance.toLocaleString()}`;
                if (balance < minWithdrawal) {
                    balanceEl.style.color = '#FF4757';
                } else {
                    balanceEl.style.color = '#00D897';
                }
            }
        }

        function updateSummary() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value) || 0;
            const fee = (amount * withdrawalFee) / 100;
            const receiveAmount = amount - fee;
            
            const summaryAmount = document.getElementById('summaryAmount');
            const feeAmount = document.getElementById('feeAmount');
            const receiveAmountEl = document.getElementById('receiveAmount');
            const submitBtn = document.getElementById('submitWithdraw');
            const walletInput = document.getElementById('walletAddress');
            const balance = currentUser.balance || 0;
            
            if (summaryAmount) summaryAmount.textContent = `$${amount.toFixed(2)}`;
            if (feeAmount) feeAmount.textContent = `$${fee.toFixed(4)}`;
            if (receiveAmountEl) receiveAmountEl.textContent = `$${receiveAmount.toFixed(4)}`;
            
            if (submitBtn) {
                if (amount < minWithdrawal && amount > 0) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = `Minimum $${minWithdrawal}`;
                } else if (amount > balance) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Insufficient Balance';
                } else if (!amount || amount <= 0) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Enter Amount';
                } else if (!walletInput?.value.trim()) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Enter Wallet Address';
                } else {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Request Withdrawal';
                }
            }
        }

        async function submitWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const walletAddress = document.getElementById('walletAddress').value.trim();
            
            if (!amount || amount < minWithdrawal) {
                showNotification(`Minimum withdrawal amount is $${minWithdrawal}`, 'error');
                return;
            }
            
            if (amount > (currentUser.balance || 0)) {
                showNotification('Insufficient balance', 'error');
                return;
            }
            
            if (!walletAddress) {
                showNotification('Please enter your wallet address', 'error');
                return;
            }
            
            const fee = (amount * withdrawalFee) / 100;
            const receiveAmount = amount - fee;
            
            const withdrawalRequest = {
                id: Date.now(),
                user_id: currentUser.id,
                user_email: currentUser.email,
                user_name: currentUser.name,
                amount: amount,
                crypto: selectedCurrency,
                wallet_address: walletAddress,
                fee_percent: withdrawalFee,
                fee_amount: fee,
                receive_amount: receiveAmount,
                status: 'pending',
                date: new Date().toISOString()
            };
            
            try {
                await supabaseDB.createWithdrawalRequest(withdrawalRequest);
                await supabaseDB.createUserActivity({
                    id: Date.now(),
                    user_id: currentUser.id,
                    type: 'withdrawal',
                    title: 'Withdrawal Request Submitted',
                    description: `$${amount} ${selectedCurrency} withdrawal requested`,
                    created_at: new Date().toISOString()
                });
                
                showNotification(
                    `Withdrawal request submitted!\nAmount: $${amount.toFixed(2)} ${selectedCurrency}\nFee: $${fee.toFixed(4)}\nYou will receive: $${receiveAmount.toFixed(4)}\n\nYour withdrawal will be processed within 24-48 hours.`, 
                    'success'
                );
                
                // Reset form
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('walletAddress').value = '';
                updateSummary();
                
                // Auto-approve for admin user (testing)
                if (currentUser.email === 'ephremgojo@gmail.com') {
                    await autoApproveWithdrawal(withdrawalRequest);
                }
            } catch (error) {
                console.error('Error submitting withdrawal:', error);
                showNotification('Failed to submit withdrawal request', 'error');
            }
        }

        async function autoApproveWithdrawal(withdrawalRequest) {
            try {
                if ((currentUser.balance || 0) < withdrawalRequest.amount) {
                    showNotification('Insufficient balance for withdrawal', 'error');
                    return;
                }
                
                await supabaseDB.updateWithdrawalRequest(withdrawalRequest.id, { status: 'approved' });
                
                const newBalance = (currentUser.balance || 0) - withdrawalRequest.amount;
                await supabaseDB.updateUserBalance(currentUser.id, newBalance);
                currentUser.balance = newBalance;
                sessionStorage.setItem('pocket_user_id', currentUser.id);
                
                await supabaseDB.createTransaction({
                    id: Date.now(),
                    user_id: currentUser.id,
                    amount: -withdrawalRequest.amount,
                    type: 'withdrawal',
                    description: `Withdrawal of $${withdrawalRequest.amount} ${withdrawalRequest.crypto}`,
                    date: new Date().toISOString()
                });
                
                await supabaseDB.createUserActivity({
                    id: Date.now(),
                    user_id: currentUser.id,
                    type: 'withdrawal_approved',
                    title: 'Withdrawal Approved',
                    description: `$${withdrawalRequest.amount} withdrawal has been processed`,
                    created_at: new Date().toISOString()
                });
                
                updateBalanceDisplay();
                showNotification(`✅ Withdrawal auto-approved! New balance: $${newBalance.toFixed(2)}`, 'success');
            } catch (error) {
                console.error('Error auto-approving withdrawal:', error);
                showNotification('Failed to auto-approve withdrawal', 'error');
            }
        }

        function showNotification(message, type) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        function setupEventListeners() {
            document.querySelectorAll('.currency-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCurrency = btn.dataset.currency;
                    updateSummary();
                });
            });
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const amount = btn.dataset.amount;
                    document.getElementById('withdrawAmount').value = amount;
                    updateSummary();
                });
            });
            
            document.getElementById('withdrawAmount').addEventListener('input', updateSummary);
            
            const walletInput = document.getElementById('walletAddress');
            if (walletInput) {
                walletInput.addEventListener('input', updateSummary);
            }
            
            document.getElementById('submitWithdraw').addEventListener('click', submitWithdrawal);
            
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            if (mobileBtn && mobileMenu) {
                mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('show'));
            }
        }

        window.logout = function() {
            if (typeof auth !== 'undefined' && auth.logout) auth.logout();
            else window.location.href = 'index.html';
        };

        async function init() {
            await new Promise(resolve => {
                const check = setInterval(() => {
                    if (typeof auth !== 'undefined') {
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
                setTimeout(() => {
                    clearInterval(check);
                    resolve();
                }, 3000);
            });
            
            currentUser = auth.getUser();
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            updateNavbar();
            updateBalanceDisplay();
            await loadSettings();
            setupEventListeners();
            updateSummary();
        }

        init();
    </script>
</body>
</html>
