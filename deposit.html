<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>PocketTrading</h2>
  </div>

  <div class="main fade-in">

    <div class="card">
      <h3>Deposit Crypto</h3>

      <p>BTC: YOUR_BTC_ADDRESS</p>
      <p>ETH: YOUR_ETH_ADDRESS</p>
      <p>USDT: YOUR_USDT_ADDRESS</p>

      <input id="amount" placeholder="Amount">
      <input type="file" id="proof">

      <button class="btn" onclick="submitDeposit()">Submit</button>
    </div>

  </div>

</div>

<script type="module" src="js/deposit.js"></script>
</body>
</html>
