<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deposit Funds - PocketTrading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F1A;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 20, 32, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 0 32px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon { font-size: 28px; }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            color: #8B93A5;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(0, 216, 151, 0.1);
            color: #00D897;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            cursor: pointer;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
        }
        .admin-badge {
            font-size: 10px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }
        .admin-link {
            padding: 8px 16px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 40px;
            color: #FF4757;
            cursor: pointer;
            font-weight: 500;
        }
        .guest-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-login {
            background: transparent;
            border: 1px solid rgba(0, 216, 151, 0.5);
            color: #00D897;
        }
        .btn-login:hover {
            background: rgba(0, 216, 151, 0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            color: white;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 216, 151, 0.3);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: #0F1420;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        .mobile-menu.show { display: flex; }
        .mobile-nav-link {
            padding: 12px;
            color: #8B93A5;
            text-decoration: none;
            border-radius: 12px;
        }

        /* Main Content - Wider Form */
        .main-content {
            margin-top: 70px;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }

        .deposit-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }
        .card-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .card-header p {
            color: #8B93A5;
            font-size: 14px;
        }

        .card-body {
            padding: 24px;
        }

        /* Balance Display */
        .balance-display {
            background: rgba(0, 216, 151, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(0, 216, 151, 0.2);
        }
        .balance-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
        }
        .balance-value {
            font-size: 32px;
            font-weight: 800;
            color: #00D897;
        }

        /* Currency Selector */
        .currency-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .currency-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 600;
        }
        .currency-btn.active {
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border-color: transparent;
        }
        .currency-btn:hover {
            border-color: #00D897;
        }

        /* Amount Input */
        .amount-section {
            margin-bottom: 24px;
        }
        .amount-label {
            font-size: 13px;
            color: #8B93A5;
            margin-bottom: 8px;
            display: block;
        }
        .amount-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        .amount-input:focus {
            outline: none;
            border-color: #00D897;
        }
        .preset-amounts {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .preset-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #8B93A5;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #00D897;
            color: #00D897;
        }

        /* Crypto Address Section */
        .crypto-address {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }
        .address-label {
            font-size: 12px;
            color: #8B93A5;
            margin-bottom: 8px;
        }
        .address-value {
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 12px;
            word-break: break-all;
            margin-bottom: 12px;
        }
        .copy-btn {
            padding: 8px 20px;
            background: rgba(0, 216, 151, 0.15);
            border: 1px solid rgba(0, 216, 151, 0.3);
            border-radius: 40px;
            color: #00D897;
            cursor: pointer;
            font-size: 13px;
        }

        /* Summary Row */
        .summary {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .summary-item {
            flex: 1;
            text-align: center;
        }
        .summary-label {
            font-size: 12px;
            color: #8B93A5;
            margin-bottom: 4px;
        }
        .summary-value {
            font-size: 18px;
            font-weight: 700;
        }
        .summary-value.total {
            color: #00D897;
            font-size: 20px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00D897, #00B8A0);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 216, 151, 0.3);
        }

        .info-text {
            text-align: center;
            font-size: 12px;
            color: #5A6475;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links, .user-section, .guest-buttons { display: none; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 16px; }
            .deposit-card { max-width: 100%; }
            .summary { flex-direction: column; }
            .summary-item { text-align: left; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">PocketTrading</span>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div id="rightNav"></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="main-content">
        <div class="deposit-card">
            <div class="card-header">
                <h1>Deposit Funds</h1>
                <p>Add funds to your trading account</p>
            </div>
            <div class="card-body">
                <div class="balance-display">
                    <div class="balance-label">Current Balance</div>
                    <div class="balance-value" id="currentBalance">$0.00</div>
                </div>

                <div class="currency-selector" id="currencySelector">
                    <button class="currency-btn active" data-currency="USDT">USDT</button>
                    <button class="currency-btn" data-currency="BTC">BTC</button>
                    <button class="currency-btn" data-currency="ETH">ETH</button>
                </div>

                <div class="amount-section">
                    <div class="amount-label">Amount</div>
                    <input type="number" id="depositAmount" class="amount-input" placeholder="Enter amount" min="10" step="10">
                    <div class="preset-amounts">
                        <button class="preset-btn" data-amount="50">$50</button>
                        <button class="preset-btn" data-amount="100">$100</button>
                        <button class="preset-btn" data-amount="500">$500</button>
                        <button class="preset-btn" data-amount="1000">$1,000</button>
                    </div>
                </div>

                <div class="crypto-address" id="cryptoAddressSection">
                    <div class="address-label" id="addressLabel">Send USDT (TRC20) to this address:</div>
                    <div class="address-value" id="cryptoAddress">TX8xKJk3g5xVHhRq2LpN7mY9wQeRtYuIoP</div>
                    <button class="copy-btn" onclick="copyAddress()">📋 Copy Address</button>
                </div>

                <div class="summary">
                    <div class="summary-item">
                        <div class="summary-label">Deposit Amount</div>
                        <div class="summary-value" id="summaryAmount">$0.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Network Fee</div>
                        <div class="summary-value" id="networkFee">$1.00</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Total to Pay</div>
                        <div class="summary-value total" id="totalAmount">$1.00</div>
                    </div>
                </div>

                <button class="submit-btn" id="submitDeposit">Submit Deposit Request</button>
                <div class="info-text">
                    ⏱️ Deposits are processed within 5-30 minutes. Minimum deposit: $10
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase-db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let selectedCurrency = 'USDT';
        
        // Default addresses (will be overridden by admin settings)
        let cryptoAddresses = {
            USDT: 'TX8xKJk3g5xVHhRq2LpN7mY9wQeRtYuIoP',
            BTC: 'bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh',
            ETH: '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb5'
        };
        
        const networkFees = {
            USDT: 1.00,
            BTC: 0.0002,
            ETH: 0.005
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await waitForAuth();
            if (typeof auth !== 'undefined') currentUser = auth.getUser();
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            await loadCryptoAddresses();
            setupNavigation();
            updateBalanceDisplay();
            setupEventListeners();
            updateSummary();
        });

        function waitForAuth() {
            return new Promise((resolve) => {
                if (typeof auth !== 'undefined') resolve();
                else setTimeout(() => resolve(), 100);
            });
        }

        async function loadCryptoAddresses() {
            try {
                // Load from localStorage first
                const savedAddresses = localStorage.getItem('crypto_deposit_addresses');
                if (savedAddresses) {
                    cryptoAddresses = JSON.parse(savedAddresses);
                }
                
                // Try to load from Supabase
                if (typeof supabaseDB !== 'undefined') {
                    const settings = await supabaseDB.getAll('platform_settings');
                    const addressSetting = settings?.find(s => s.key === 'crypto_deposit_addresses');
                    if (addressSetting && addressSetting.value) {
                        cryptoAddresses = JSON.parse(addressSetting.value);
                        localStorage.setItem('crypto_deposit_addresses', JSON.stringify(cryptoAddresses));
                    }
                }
            } catch (error) {
                console.error('Error loading crypto addresses:', error);
            }
            updateCryptoAddress();
        }

        function setupNavigation() {
            const navLinks = document.getElementById('navLinks');
            const rightNav = document.getElementById('rightNav');
            const mobileMenu = document.getElementById('mobileMenu');
            
            const isAdmin = currentUser.email === 'ephremgojo@gmail.com';
            const userName = currentUser.name || currentUser.email.split('@')[0];
            
            navLinks.innerHTML = `
                <a href="index.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trades.html" class="nav-link">Trades</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            `;
            
            rightNav.innerHTML = `
                <div class="user-section">
                    <div class="user-info">
                        <div class="user-avatar">${userName.charAt(0).toUpperCase()}</div>
                        <div class="user-name">${userName}${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div>
                    </div>
                    ${isAdmin ? '<a href="admin.html" class="admin-link">⚙️ Admin Panel</a>' : ''}
                    <button class="logout-btn" onclick="handleLogout()">Logout</button>
                </div>
            `;
            
            mobileMenu.innerHTML = `
                <a href="index.html" class="mobile-nav-link">🏠 Home</a>
                <a href="markets.html" class="mobile-nav-link">📊 Markets</a>
                <a href="trades.html" class="mobile-nav-link">🔄 Trades</a>
                <a href="profile.html" class="mobile-nav-link">👤 My Profile</a>
                ${isAdmin ? '<a href="admin.html" class="mobile-nav-link">⚙️ Admin Panel</a>' : ''}
                <button class="logout-btn" style="margin-top:12px;" onclick="handleLogout()">Logout</button>
            `;
        }

        function updateBalanceDisplay() {
            const balance = currentUser.balance || 0;
            document.getElementById('currentBalance').textContent = `$${balance.toLocaleString()}`;
        }

        function updateCryptoAddress() {
            const address = cryptoAddresses[selectedCurrency] || cryptoAddresses['USDT'];
            const addressEl = document.getElementById('cryptoAddress');
            const addressLabel = document.getElementById('addressLabel');
            
            if (addressEl) addressEl.textContent = address;
            if (addressLabel) {
                let network = 'TRC20';
                if (selectedCurrency === 'BTC') network = 'BTC';
                if (selectedCurrency === 'ETH') network = 'ERC20';
                addressLabel.textContent = `Send ${selectedCurrency} (${network}) to this address:`;
            }
        }

        function updateSummary() {
            const amount = parseFloat(document.getElementById('depositAmount').value) || 0;
            const fee = networkFees[selectedCurrency] || 1;
            const total = amount + fee;
            
            document.getElementById('summaryAmount').textContent = `$${amount.toFixed(2)}`;
            document.getElementById('networkFee').textContent = `$${fee.toFixed(4)}`;
            document.getElementById('totalAmount').textContent = `$${total.toFixed(4)}`;
        }

        function setupEventListeners() {
            document.querySelectorAll('.currency-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCurrency = btn.dataset.currency;
                    updateCryptoAddress();
                    updateSummary();
                });
            });
            
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const amount = btn.dataset.amount;
                    document.getElementById('depositAmount').value = amount;
                    updateSummary();
                });
            });
            
            document.getElementById('depositAmount').addEventListener('input', updateSummary);
            document.getElementById('submitDeposit').addEventListener('click', submitDeposit);
            
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            if (mobileBtn && mobileMenu) {
                mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('show'));
            }
        }

        async function submitDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (!amount || amount < 10) {
                alert('Please enter a valid amount (minimum $10)');
                return;
            }
            
            const fee = networkFees[selectedCurrency] || 1;
            const total = amount + fee;
            
            const depositRequest = {
                id: Date.now(),
                user_id: currentUser.id,
                user_email: currentUser.email,
                user_name: currentUser.name,
                amount: amount,
                currency: selectedCurrency,
                fee: fee,
                total: total,
                status: 'pending',
                date: new Date().toISOString()
            };
            
            const existingRequests = JSON.parse(localStorage.getItem('deposit_requests') || '[]');
            existingRequests.push(depositRequest);
            localStorage.setItem('deposit_requests', JSON.stringify(existingRequests));
            
            const userDeposits = JSON.parse(localStorage.getItem(`deposits_${currentUser.id}`) || '[]');
            userDeposits.push(depositRequest);
            localStorage.setItem(`deposits_${currentUser.id}`, JSON.stringify(userDeposits));
            
            if (typeof supabaseDB !== 'undefined') {
                try {
                    await supabaseDB.insert('deposit_requests', depositRequest);
                } catch (e) {
                    console.log('Supabase save failed');
                }
            }
            
            alert(`Deposit request submitted!\nAmount: $${amount.toFixed(2)} ${selectedCurrency}\n\nYour deposit will be processed within 5-30 minutes.`);
            
            document.getElementById('depositAmount').value = '';
            updateSummary();
            
            // Auto-approve for admin/demo users
            if (currentUser.email === 'ephremgojo@gmail.com') {
                const newBalance = (currentUser.balance || 0) + amount;
                currentUser.balance = newBalance;
                if (typeof auth !== 'undefined' && auth.updateBalance) {
                    await auth.updateBalance(currentUser.id, amount, { type: 'deposit', auto_approved: true });
                }
                updateBalanceDisplay();
                alert(`✅ Auto-approved! New balance: $${newBalance.toFixed(2)}`);
            }
        }

        window.copyAddress = function() {
            const address = document.getElementById('cryptoAddress').textContent;
            navigator.clipboard.writeText(address);
            alert('Address copied to clipboard!');
        };

        window.handleLogout = function() {
            if (typeof auth !== 'undefined' && auth.logout) auth.logout();
            else { localStorage.clear(); sessionStorage.clear(); window.location.href = 'index.html'; }
        };
    </script>
</body>
</html>
