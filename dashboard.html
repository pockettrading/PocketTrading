<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* User Info in Top Right */
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .username {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .logout-link {
            color: var(--danger);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-link:hover {
            text-decoration: underline;
        }

        /* Auth Buttons */
        .auth-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .login-btn {
            background: transparent;
            color: var(--primary);
            padding: 8px 20px;
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .login-btn:hover {
            background: rgba(247, 147, 26, 0.1);
            transform: translateY(-2px);
        }

        .signup-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        /* Admin Badge */
        .admin-badge {
            background: linear-gradient(135deg, var(--danger), #ff6b6b);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 20px;
            max-width: 500px;
            margin: 2rem auto;
        }

        .login-prompt h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .login-prompt p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .stat-label {
            font-size: 0.85rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-change {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .stat-value.positive {
            color: var(--success);
        }

        .stat-value.negative {
            color: var(--danger);
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        /* Trading Section */
        .trading-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-container,
        .market-data {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .timeframe-select {
            background: var(--darker-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .chart-placeholder {
            min-height: 300px;
        }

        canvas {
            max-height: 300px;
            width: 100%;
        }

        /* Crypto List */
        .crypto-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .crypto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--darker-bg);
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .crypto-item:hover {
            background: var(--card-hover);
            transform: translateX(4px);
        }

        .crypto-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .crypto-icon {
            font-size: 1.5rem;
        }

        .crypto-symbol {
            font-weight: 600;
        }

        .crypto-name {
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .crypto-price {
            text-align: right;
        }

        .crypto-price-value {
            font-weight: 600;
        }

        .crypto-change {
            font-size: 0.75rem;
        }

        .crypto-change.positive {
            color: var(--success);
        }

        .crypto-change.negative {
            color: var(--danger);
        }

        /* Transactions Section */
        .transactions-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .transactions-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .transaction-type {
            text-transform: capitalize;
            font-weight: 500;
        }

        .transaction-type.buy,
        .transaction-type.deposit {
            color: var(--success);
        }

        .transaction-type.sell,
        .transaction-type.withdraw {
            color: var(--danger);
        }

        .positive-amount {
            color: var(--success);
        }

        .negative-amount {
            color: var(--danger);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-completed {
            background: rgba(0, 216, 151, 0.1);
            color: var(--success);
        }

        .status-pending {
            background: rgba(255, 165, 2, 0.1);
            color: var(--warning);
        }

        @media (max-width: 968px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .trading-section {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
            
            .user-info {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trade.html" class="nav-link">Trades</a>
            </div>
            <div class="user-info" id="userInfo"></div>
        </div>

        <div id="dashboardContent">
            <!-- Content will be populated by JavaScript based on login status -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
