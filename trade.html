<!-- trade.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Trade</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <!-- Same sidebar as dashboard -->
            <div class="sidebar-logo">
                <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span>Trading</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="trade.html" class="nav-item active">Trade</a>
                <a href="deposit.html" class="nav-item">Deposit</a>
                <a href="withdraw.html" class="nav-item">Withdraw</a>
                <a href="profile.html" class="nav-item">Profile</a>
            </nav>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </aside>

        <main class="main-content">
            <div class="trade-container">
                <div class="trade-header">
                    <h1>Trading Platform</h1>
                    <div class="balance-display">
                        Available Balance: $<span id="tradeBalance">0</span>
                    </div>
                </div>

                <div class="trade-grid">
                    <!-- Order Form -->
                    <div class="order-form">
                        <div class="order-type">
                            <button class="order-btn active" data-type="buy">Buy</button>
                            <button class="order-btn" data-type="sell">Sell</button>
                        </div>
                        
                        <div class="form-group">
                            <label>Cryptocurrency</label>
                            <select id="cryptoSelect">
                                <option value="BTC">Bitcoin (BTC)</option>
                                <option value="ETH">Ethereum (ETH)</option>
                                <option value="BNB">Binance Coin (BNB)</option>
                                <option value="SOL">Solana (SOL)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Order Type</label>
                            <select id="orderType">
                                <option value="market">Market Order</option>
                                <option value="limit">Limit Order</option>
                            </select>
                        </div>

                        <div class="form-group" id="limitPriceGroup" style="display: none;">
                            <label>Limit Price (USD)</label>
                            <input type="number" id="limitPrice" placeholder="Enter price">
                        </div>

                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" id="amount" placeholder="Enter amount">
                        </div>

                        <div class="order-summary">
                            <div class="summary-item">
                                <span>Total:</span>
                                <strong id="totalValue">$0.00</strong>
                            </div>
                            <div class="summary-item">
                                <span>Fee (0.1%):</span>
                                <strong id="feeAmount">$0.00</strong>
                            </div>
                        </div>

                        <button id="placeOrderBtn" class="btn-primary btn-block">Place Order</button>
                    </div>

                    <!-- Market Data -->
                    <div class="market-prices">
                        <h3>Market Prices</h3>
                        <div id="marketPrices" class="market-list"></div>
                    </div>
                </div>

                <!-- Open Orders -->
                <div class="open-orders">
                    <h3>Open Orders</h3>
                    <div class="orders-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Type</th>
                                    <th>Crypto</th>
                                    <th>Amount</th>
                                    <th>Price</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="openOrdersList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/trade.js"></script>
</body>
</html>
