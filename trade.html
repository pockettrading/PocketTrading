<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Trade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* User Dropdown (for logged-in users) */
        .user-dropdown {
            position: relative;
            cursor: pointer;
        }

        .user-name-display {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--card-bg);
            border-radius: 40px;
            transition: all 0.3s;
        }

        .user-name-display:hover {
            background: var(--card-hover);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 160px;
            display: none;
            z-index: 100;
            margin-top: 0.5rem;
            box-shadow: var(--shadow);
        }

        .user-dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            padding: 10px 16px;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            transition: all 0.3s;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .dropdown-item:hover {
            background: var(--card-hover);
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 0.5rem 0;
        }

        /* Trade Container */
        .trade-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .trade-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .trade-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .trade-header p {
            color: var(--text-secondary);
        }

        /* Trade Card */
        .trade-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
        }

        /* Order Type Tabs */
        .order-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .order-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            position: relative;
        }

        .order-tab.buy.active {
            color: var(--success);
        }

        .order-tab.sell.active {
            color: var(--danger);
        }

        .order-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: currentColor;
        }

        /* Crypto Selector */
        .crypto-selector {
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .crypto-selector:hover {
            border-color: var(--primary);
        }

        .selected-crypto {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .crypto-icon {
            font-size: 2rem;
        }

        .crypto-symbol {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .crypto-name {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .current-price-display {
            text-align: right;
        }

        .price-value {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .price-change {
            font-size: 0.7rem;
        }

        .price-change.positive {
            color: var(--success);
        }

        .price-change.negative {
            color: var(--danger);
        }

        /* Crypto Dropdown */
        .crypto-dropdown {
            position: absolute;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 300px;
            z-index: 100;
            margin-top: 4px;
            overflow: hidden;
        }

        .crypto-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .crypto-option:hover {
            background: var(--card-hover);
        }

        .crypto-option-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .crypto-option-price {
            text-align: right;
        }

        /* Amount Input */
        .amount-section {
            margin-bottom: 1.5rem;
        }

        .amount-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .amount-input {
            width: 100%;
            padding: 16px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Duration Selector */
        .duration-section {
            margin-bottom: 1.5rem;
        }

        .duration-label {
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .duration-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }

        .duration-btn {
            padding: 12px 8px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
        }

        .duration-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .duration-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .duration-profit {
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .duration-profit.positive {
            color: var(--success);
        }

        /* Info Rows */
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .info-value {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .info-value.positive {
            color: var(--success);
        }

        /* Trade Button */
        .trade-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .trade-btn.buy {
            background: linear-gradient(135deg, var(--success), #00b894);
            color: white;
        }

        .trade-btn.sell {
            background: linear-gradient(135deg, var(--danger), #ff6b6b);
            color: white;
        }

        .trade-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 24px;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-prompt h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .login-prompt p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .login-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-login {
            background: transparent;
            color: var(--primary);
            padding: 12px 32px;
            border: 1px solid var(--primary);
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: rgba(247, 147, 26, 0.1);
        }

        .btn-signup {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .top-nav {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
            
            .duration-buttons {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .trade-card {
                padding: 1.5rem;
            }
            
            .login-buttons {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 480px) {
            .duration-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar - No Login/Sign Up buttons here -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trade.html" class="nav-link" style="color: var(--primary);">Trades</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </div>
            <div id="userSection"></div>
        </div>

        <div id="tradeContent">
            <!-- Content will be populated by JavaScript based on login status -->
        </div>
    </div>

    <script src="js/trade.js"></script>
</body>
</html>
