<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Trading - Trade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #F7931A;
            --primary-dark: #e67e22;
            --primary-light: #f8b45a;
            --dark-bg: #0A0E17;
            --darker-bg: #06090F;
            --card-bg: #151E2C;
            --card-hover: #1A2535;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AAB5;
            --text-tertiary: #6B7A8A;
            --success: #00D897;
            --danger: #FF4757;
            --warning: #FFA502;
            --border: #2A3545;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        /* User Dropdown */
        .user-dropdown {
            position: relative;
            cursor: pointer;
        }

        .user-name-display {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--card-bg);
            border-radius: 40px;
            transition: all 0.3s;
        }

        .user-name-display:hover {
            background: var(--card-hover);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 160px;
            display: none;
            z-index: 100;
            margin-top: 0.5rem;
            box-shadow: var(--shadow);
        }

        .user-dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            padding: 10px 16px;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            transition: all 0.3s;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .dropdown-item:hover {
            background: var(--card-hover);
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 0.5rem 0;
        }

        .signup-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 8px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        /* Trade Container */
        .trade-container {
            display: grid;
            grid-template-columns: 1fr 0.8fr;
            gap: 2rem;
        }

        /* Order Section */
        .order-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* Order Type Tabs */
        .order-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .order-tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .order-tab.active {
            background: rgba(247, 147, 26, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Crypto Selector */
        .crypto-selector {
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .crypto-selector:hover {
            border-color: var(--primary);
        }

        .selected-crypto {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .crypto-icon {
            font-size: 1.5rem;
        }

        .crypto-symbol {
            font-weight: 600;
        }

        .crypto-name {
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* Current Price */
        .current-price {
            background: var(--darker-bg);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .price-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .price-change {
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-block;
            margin-left: 8px;
        }

        .price-change.positive {
            background: rgba(0, 216, 151, 0.1);
            color: var(--success);
        }

        .price-change.negative {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
        }

        /* Order Type Radio */
        .order-type-group {
            display: flex;
            gap: 1rem;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Amount Input */
        .amount-input {
            width: 100%;
            padding: 12px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .quick-amounts {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .quick-amount {
            flex: 1;
            padding: 6px;
            background: var(--darker-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.75rem;
        }

        .quick-amount:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Order Summary */
        .order-summary {
            background: var(--darker-bg);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .summary-row.total {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            font-size: 1rem;
            font-weight: 700;
        }

        /* Trade Button */
        .btn-trade {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-trade.buy {
            background: linear-gradient(135deg, var(--success), #00b894);
            color: white;
        }

        .btn-trade.sell {
            background: linear-gradient(135deg, var(--danger), #ff6b6b);
            color: white;
        }

        .btn-trade:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Market Data Section */
        .market-data-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .market-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .market-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .last-updated {
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .market-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--darker-bg);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .market-item:hover {
            background: var(--card-hover);
            transform: translateX(4px);
        }

        .market-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .market-symbol {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .market-price {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .market-change {
            font-size: 0.75rem;
        }

        .market-change.positive {
            color: var(--success);
        }

        .market-change.negative {
            color: var(--danger);
        }

        /* Open Orders */
        .orders-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .order-type {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .order-type.buy {
            background: rgba(0, 216, 151, 0.2);
            color: var(--success);
        }

        .order-type.sell {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .order-cancel {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.75rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-tertiary);
        }

        .btn-clear {
            background: var(--darker-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        @media (max-width: 968px) {
            .trade-container {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#F7931A"/>
                    <path d="M20 10L25 15L20 20L15 15L20 10Z" fill="white"/>
                    <path d="M20 20L25 25L20 30L15 25L20 20Z" fill="white"/>
                </svg>
                <span>Pocket<span style="color: var(--primary);">Trading</span></span>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="markets.html" class="nav-link">Markets</a>
                <a href="trade.html" class="nav-link" style="color: var(--primary);">Trades</a>
            </div>
            <div id="userSection"></div>
        </div>

        <!-- Trading Interface -->
        <div class="trade-container">
            <!-- Left: Order Form -->
            <div class="order-section">
                <h2 class="section-title">Place Order</h2>
                
                <!-- Buy/Sell Tabs -->
                <div class="order-tabs">
                    <button class="order-tab active" id="buyTab">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M7 10l5-5 5 5"/>
                        </svg>
                        Buy
                    </button>
                    <button class="order-tab" id="sellTab">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19V5M7 14l5 5 5-5"/>
                        </svg>
                        Sell
                    </button>
                </div>

                <!-- Cryptocurrency Selector -->
                <div class="form-group">
                    <label>Cryptocurrency</label>
                    <div class="crypto-selector" id="cryptoSelector">
                        <div class="selected-crypto" id="selectedCrypto">
                            <span class="crypto-icon">₿</span>
                            <div>
                                <div class="crypto-symbol">BTC</div>
                                <div class="crypto-name">Bitcoin</div>
                            </div>
                        </div>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </div>
                </div>

                <!-- Current Price -->
                <div class="current-price">
                    <div>
                        <span class="price-value" id="currentPrice">$43,238.25</span>
                        <span class="price-change positive" id="priceChange">+0.08%</span>
                    </div>
                </div>

                <!-- Order Type -->
                <div class="form-group">
                    <label>Order Type</label>
                    <div class="order-type-group">
                        <label class="radio-label">
                            <input type="radio" name="orderType" value="market" checked> Market
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="orderType" value="limit"> Limit
                        </label>
                    </div>
                </div>

                <!-- Limit Price (hidden by default) -->
                <div class="form-group" id="limitPriceGroup" style="display: none;">
                    <label>Limit Price (USD)</label>
                    <input type="number" id="limitPrice" class="amount-input" placeholder="Enter limit price" step="0.01">
                </div>

                <!-- Amount -->
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" class="amount-input" placeholder="Enter amount" step="0.0001">
                    <div class="quick-amounts">
                        <button type="button" class="quick-amount" data-percent="25">25%</button>
                        <button type="button" class="quick-amount" data-percent="50">50%</button>
                        <button type="button" class="quick-amount" data-percent="75">75%</button>
                        <button type="button" class="quick-amount" data-percent="100">100%</button>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="order-summary">
                    <div class="summary-row">
                        <span>Total:</span>
                        <strong id="totalValue">$0.00</strong>
                    </div>
                    <div class="summary-row">
                        <span>Fee (0.1%):</span>
                        <strong id="feeAmount">$0.00</strong>
                    </div>
                    <div class="summary-row total">
                        <span>Total Cost:</span>
                        <strong id="totalCost">$0.00</strong>
                    </div>
                </div>

                <!-- Trade Button -->
                <button class="btn-trade buy" id="tradeBtn">Buy Bitcoin (BTC)</button>
            </div>

            <!-- Right: Market Data -->
            <div class="market-data-section">
                <!-- Market Prices -->
                <div class="market-card">
                    <div class="market-header">
                        <h3>Market Prices</h3>
                        <span class="last-updated" id="lastUpdated">Live</span>
                    </div>
                    <div class="market-list" id="marketPrices">
                        Loading...
                    </div>
                </div>

                <!-- Open Orders -->
                <div class="market-card">
                    <div class="market-header">
                        <h3>Open Orders</h3>
                        <button class="btn-clear" id="clearOrdersBtn">Clear All</button>
                    </div>
                    <div class="orders-list" id="openOrdersList">
                        <div class="empty-state">No open orders</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/trade.js"></script>
</body>
</html>
